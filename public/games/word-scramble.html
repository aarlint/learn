<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Scramble</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0a1a;
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
}

.game-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* HUD */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(34, 197, 94, 0.15);
  border-bottom: 2px solid rgba(34, 197, 94, 0.3);
}

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1rem;
  font-weight: 600;
  color: white;
}

.stat-icon { font-size: 1.2rem; }
.stat-value { color: #4ade80; }

.level-badge {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 700;
  color: white;
  font-size: 0.85rem;
}

/* Timer bar */
.timer-bar-container {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
}

.timer-bar {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  transition: width 0.1s linear, background 0.3s;
  width: 100%;
}

.timer-bar.warning {
  background: linear-gradient(90deg, #f59e0b, #fbbf24);
}

.timer-bar.danger {
  background: linear-gradient(90deg, #ef4444, #f87171);
}

/* Main play area */
.play-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

/* Category label */
.category-label {
  font-size: 0.85rem;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* Word counter */
.word-counter {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.4);
  font-weight: 600;
}

/* Hint area */
.hint-area {
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}

.hint-text {
  font-size: 0.95rem;
  color: #fbbf24;
  text-align: center;
  font-style: italic;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Answer slots */
.answer-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 64px;
  padding: 8px;
}

.answer-slot {
  width: 52px;
  height: 58px;
  border: 2px dashed rgba(34, 197, 94, 0.4);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  transition: all 0.2s;
  background: rgba(34, 197, 94, 0.05);
}

.answer-slot.filled {
  border: 2px solid rgba(34, 197, 94, 0.6);
  background: rgba(34, 197, 94, 0.15);
}

.answer-slot.locked {
  border: 2px solid #22c55e;
  background: rgba(34, 197, 94, 0.3);
  color: #4ade80;
}

.answer-slot.correct-pop {
  animation: correctPop 0.4s ease-out;
}

@keyframes correctPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); background: rgba(34, 197, 94, 0.4); }
  100% { transform: scale(1); }
}

/* Scrambled letter tiles */
.tile-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 64px;
  padding: 8px;
}

.letter-tile {
  width: 52px;
  height: 58px;
  background: linear-gradient(135deg, #374151, #1f2937);
  border: 2px solid #4b5563;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.letter-tile:active {
  transform: scale(0.92);
}

.letter-tile.used {
  opacity: 0.2;
  transform: scale(0.9);
  pointer-events: none;
}

.letter-tile.slide-up {
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0.5; }
  to { transform: translateY(0); opacity: 1; }
}

.letter-tile.slide-down {
  animation: slideDown 0.2s ease-out;
}

@keyframes slideDown {
  from { transform: translateY(-20px); opacity: 0.5; }
  to { transform: translateY(0); opacity: 1; }
}

/* Shake animation for wrong answers */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.shake {
  animation: shake 0.4s ease-out;
}

.shake .answer-slot {
  border-color: #ef4444 !important;
  background: rgba(239, 68, 68, 0.2) !important;
}

/* Feedback overlay text */
.feedback {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.5rem;
  font-weight: 800;
  z-index: 20;
  animation: popIn 0.6s ease-out forwards;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  pointer-events: none;
}

.feedback.correct { color: #22c55e; }
.feedback.wrong { color: #ef4444; }
.feedback.timeout { color: #f59e0b; }

@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  z-index: 50;
  pointer-events: none;
  animation: confettiFall 1s ease-out forwards;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(60vh) rotate(720deg) scale(0.3); }
}

/* Submit button */
.submit-btn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  border: none;
  padding: 14px 48px;
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  opacity: 0.4;
  pointer-events: none;
}

.submit-btn.active {
  opacity: 1;
  pointer-events: auto;
}

.submit-btn:active {
  transform: scale(0.95);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: linear-gradient(135deg, #052e16, #14532d);
  border: 2px solid rgba(34, 197, 94, 0.5);
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  color: white;
  max-width: 90%;
  width: 380px;
}

.modal h2 { font-size: 2rem; margin-bottom: 8px; }
.modal .stars { font-size: 2.5rem; margin: 16px 0; }
.modal p { color: rgba(255,255,255,0.7); margin-bottom: 6px; font-size: 0.95rem; }
.modal .score-line { font-size: 1.3rem; font-weight: 700; color: #4ade80; margin: 12px 0; }

.modal button {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
}

.modal button:active { transform: scale(0.95); }

.modal .btn-secondary {
  background: linear-gradient(135deg, #374151, #1f2937);
  margin-left: 8px;
}

.hidden { display: none !important; }

/* Lives display */
.lives {
  display: flex;
  gap: 4px;
}

.life {
  font-size: 1.2rem;
  transition: all 0.3s;
}

.life.lost {
  opacity: 0.2;
  transform: scale(0.8);
}

@media (max-width: 400px) {
  .answer-slot, .letter-tile {
    width: 44px;
    height: 50px;
    font-size: 1.3rem;
  }
}
</style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="stat">
      <span class="stat-icon">&#11088;</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="level-badge" id="levelBadge">Level 1</div>
    <div class="lives" id="lives">
      <span class="life">&#x1F49A;</span>
      <span class="life">&#x1F49A;</span>
      <span class="life">&#x1F49A;</span>
    </div>
  </div>
  <div class="timer-bar-container">
    <div class="timer-bar" id="timerBar"></div>
  </div>

  <div class="play-area" id="playArea">
    <div class="category-label" id="category">Animals</div>
    <div class="word-counter" id="wordCounter">Word 1 / 10</div>

    <div class="hint-area" id="hintArea"></div>

    <div class="answer-row" id="answerRow"></div>

    <div style="height: 16px;"></div>

    <div class="tile-row" id="tileRow"></div>

    <button class="submit-btn" id="submitBtn">Check</button>
  </div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Level Complete!</h2>
    <div class="stars" id="modalStars">&#11088;&#11088;&#11088;</div>
    <div class="score-line" id="modalScore">+500 points</div>
    <p id="modalText">Great vocabulary!</p>
    <div>
      <button id="modalBtn">Next Level</button>
    </div>
  </div>
</div>

<script>
// --- Word Data ---
const WORDS = {
  1: [
    { word: 'tiger', category: 'Animals', hint: 'A large striped wild cat' },
    { word: 'ocean', category: 'Geography', hint: 'A huge body of salt water' },
    { word: 'plant', category: 'Science', hint: 'A living thing that grows in soil' },
    { word: 'earth', category: 'Science', hint: 'The planet we live on' },
    { word: 'brain', category: 'Science', hint: 'The organ inside your head that helps you think' },
    { word: 'cloud', category: 'Science', hint: 'White puffy thing in the sky made of water droplets' },
    { word: 'river', category: 'Geography', hint: 'A large natural stream of flowing water' },
    { word: 'stone', category: 'Vocabulary', hint: 'A hard solid piece of rock' },
    { word: 'flame', category: 'Vocabulary', hint: 'The hot glowing part of a fire' },
    { word: 'frost', category: 'Science', hint: 'Thin ice crystals that form on cold surfaces' },
  ],
  2: [
    { word: 'planet', category: 'Science', hint: 'A large object that orbits a star' },
    { word: 'desert', category: 'Geography', hint: 'A dry sandy area with very little rain' },
    { word: 'fossil', category: 'Science', hint: 'Preserved remains of ancient living things' },
    { word: 'oxygen', category: 'Science', hint: 'The gas in air that we breathe to stay alive' },
    { word: 'magnet', category: 'Science', hint: 'An object that attracts iron and steel' },
    { word: 'galaxy', category: 'Science', hint: 'A huge collection of stars, gas, and dust in space' },
    { word: 'insect', category: 'Animals', hint: 'A small creature with six legs' },
    { word: 'valley', category: 'Geography', hint: 'A low area of land between hills or mountains' },
    { word: 'volcano', category: 'Geography', hint: 'A mountain that can erupt with lava' },
    { word: 'jungle', category: 'Geography', hint: 'A thick tropical forest' },
  ],
  3: [
    { word: 'compass', category: 'Vocabulary', hint: 'A tool that always points north' },
    { word: 'dolphin', category: 'Animals', hint: 'A smart ocean mammal known for jumping' },
    { word: 'gravity', category: 'Science', hint: 'The force that pulls things toward the ground' },
    { word: 'tornado', category: 'Science', hint: 'A violent spinning column of air' },
    { word: 'mineral', category: 'Science', hint: 'A natural solid substance found in rocks' },
    { word: 'tropics', category: 'Geography', hint: 'The warm region near the equator' },
    { word: 'penguin', category: 'Animals', hint: 'A black and white bird that cannot fly but swims' },
    { word: 'rainbow', category: 'Science', hint: 'A colorful arc in the sky after rain' },
    { word: 'habitat', category: 'Science', hint: 'The natural home of an animal or plant' },
    { word: 'lantern', category: 'Vocabulary', hint: 'A lamp with a protective case around it' },
  ],
  4: [
    { word: 'dinosaur', category: 'Science', hint: 'A prehistoric reptile that lived millions of years ago' },
    { word: 'molecule', category: 'Science', hint: 'The smallest unit of a chemical compound' },
    { word: 'magnetic', category: 'Science', hint: 'Having the power to attract iron objects' },
    { word: 'bacteria', category: 'Science', hint: 'Tiny living things too small to see without a microscope' },
    { word: 'skeleton', category: 'Science', hint: 'The framework of bones inside your body' },
    { word: 'chemical', category: 'Science', hint: 'A substance made of atoms and molecules' },
    { word: 'organism', category: 'Science', hint: 'Any individual living thing' },
    { word: 'predator', category: 'Animals', hint: 'An animal that hunts other animals for food' },
    { word: 'triangle', category: 'Vocabulary', hint: 'A shape with three sides and three angles' },
    { word: 'equation', category: 'Vocabulary', hint: 'A math statement showing two things are equal' },
  ],
};

// --- Game State ---
let level = 1;
let wordIndex = 0;
let score = 0;
let lives = 3;
let currentWord = '';
let currentHint = '';
let currentCategory = '';
let placed = [];          // indices of tiles placed in answer slots
let lockedPositions = []; // answer positions that are locked (hint)
let timerInterval = null;
let timeLeft = 30000;
let hintFirstShown = false;
let hintDefShown = false;
let gameOver = false;
let levelWords = [];

const TIMER_TOTAL = 30000;
const HINT_FIRST_LETTER_MS = 15000;
const HINT_DEFINITION_MS = 10000;

// --- DOM ---
const $score = document.getElementById('score');
const $levelBadge = document.getElementById('levelBadge');
const $lives = document.getElementById('lives');
const $timerBar = document.getElementById('timerBar');
const $category = document.getElementById('category');
const $wordCounter = document.getElementById('wordCounter');
const $hintArea = document.getElementById('hintArea');
const $answerRow = document.getElementById('answerRow');
const $tileRow = document.getElementById('tileRow');
const $submitBtn = document.getElementById('submitBtn');
const $playArea = document.getElementById('playArea');
const $modal = document.getElementById('modal');
const $modalTitle = document.getElementById('modalTitle');
const $modalStars = document.getElementById('modalStars');
const $modalScore = document.getElementById('modalScore');
const $modalText = document.getElementById('modalText');
const $modalBtn = document.getElementById('modalBtn');

// --- Scramble ---
function scrambleWord(word) {
  const arr = word.split('');
  // Fisher-Yates, ensure it's different from original
  let scrambled;
  let attempts = 0;
  do {
    scrambled = [...arr];
    for (let i = scrambled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [scrambled[i], scrambled[j]] = [scrambled[j], scrambled[i]];
    }
    attempts++;
  } while (scrambled.join('') === word && attempts < 20);
  return scrambled;
}

// --- Start Level ---
function startLevel() {
  levelWords = [...WORDS[level]];
  // Shuffle word order
  for (let i = levelWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [levelWords[i], levelWords[j]] = [levelWords[j], levelWords[i]];
  }
  wordIndex = 0;
  updateHUD();
  loadWord();
}

// --- Load Word ---
function loadWord() {
  if (wordIndex >= levelWords.length) {
    showLevelComplete();
    return;
  }

  const entry = levelWords[wordIndex];
  currentWord = entry.word;
  currentHint = entry.hint;
  currentCategory = entry.category;
  placed = [];
  lockedPositions = [];
  hintFirstShown = false;
  hintDefShown = false;

  $category.textContent = currentCategory;
  $wordCounter.textContent = `Word ${wordIndex + 1} / ${levelWords.length}`;
  $hintArea.innerHTML = '';

  // Build scrambled tiles
  const scrambled = scrambleWord(currentWord);
  $tileRow.innerHTML = '';
  scrambled.forEach((letter, i) => {
    const tile = document.createElement('div');
    tile.className = 'letter-tile';
    tile.textContent = letter;
    tile.dataset.index = i;
    tile.dataset.letter = letter;
    tile.addEventListener('click', () => placeTile(i));
    $tileRow.appendChild(tile);
  });

  // Build answer slots
  $answerRow.innerHTML = '';
  for (let i = 0; i < currentWord.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot';
    slot.dataset.pos = i;
    slot.addEventListener('click', () => removeTileAt(i));
    $answerRow.appendChild(slot);
  }

  $submitBtn.classList.remove('active');
  startTimer();
}

// --- Place / Remove Tiles ---
function placeTile(tileIndex) {
  const tiles = $tileRow.children;
  if (tiles[tileIndex].classList.contains('used')) return;

  // Find first empty non-locked slot
  const slots = $answerRow.children;
  let targetPos = -1;
  for (let i = 0; i < slots.length; i++) {
    if (!slots[i].classList.contains('filled') && !slots[i].classList.contains('locked')) {
      targetPos = i;
      break;
    }
  }
  if (targetPos === -1) return;

  tiles[tileIndex].classList.add('used');
  slots[targetPos].textContent = tiles[tileIndex].dataset.letter;
  slots[targetPos].classList.add('filled');
  slots[targetPos].dataset.tileIndex = tileIndex;
  slots[targetPos].classList.add('correct-pop');
  setTimeout(() => slots[targetPos].classList.remove('correct-pop'), 400);

  placed.push({ tileIndex, pos: targetPos });
  checkAllFilled();
}

function removeTileAt(pos) {
  const slots = $answerRow.children;
  const slot = slots[pos];
  if (!slot.classList.contains('filled') || slot.classList.contains('locked')) return;

  const tileIndex = parseInt(slot.dataset.tileIndex);
  const tiles = $tileRow.children;
  tiles[tileIndex].classList.remove('used');
  tiles[tileIndex].classList.add('slide-down');
  setTimeout(() => tiles[tileIndex].classList.remove('slide-down'), 200);

  slot.textContent = '';
  slot.classList.remove('filled');
  delete slot.dataset.tileIndex;

  placed = placed.filter(p => p.pos !== pos);
  checkAllFilled();
}

function checkAllFilled() {
  const slots = $answerRow.children;
  let allFilled = true;
  for (let i = 0; i < slots.length; i++) {
    if (!slots[i].classList.contains('filled') && !slots[i].classList.contains('locked')) {
      allFilled = false;
      break;
    }
  }
  if (allFilled) {
    $submitBtn.classList.add('active');
  } else {
    $submitBtn.classList.remove('active');
  }
}

// --- Submit ---
$submitBtn.addEventListener('click', () => {
  if (!$submitBtn.classList.contains('active')) return;
  checkAnswer();
});

function checkAnswer() {
  const slots = $answerRow.children;
  let guess = '';
  for (let i = 0; i < slots.length; i++) {
    guess += slots[i].textContent.toLowerCase();
  }

  if (guess === currentWord) {
    onCorrect();
  } else {
    onWrong();
  }
}

function onCorrect() {
  stopTimer();
  // Score: base 100 + time bonus
  const timeBonus = Math.floor((timeLeft / TIMER_TOTAL) * 200);
  const wordScore = 100 + timeBonus;
  score += wordScore;
  updateHUD();

  showFeedback(`+${wordScore}`, 'correct');
  spawnConfetti();

  // Animate slots
  const slots = $answerRow.children;
  for (let i = 0; i < slots.length; i++) {
    slots[i].style.borderColor = '#22c55e';
    slots[i].style.background = 'rgba(34,197,94,0.3)';
  }

  setTimeout(() => {
    wordIndex++;
    loadWord();
  }, 1200);
}

function onWrong() {
  showFeedback('Try Again!', 'wrong');
  $answerRow.classList.add('shake');
  setTimeout(() => $answerRow.classList.remove('shake'), 500);

  // Clear non-locked slots
  setTimeout(() => {
    const slots = $answerRow.children;
    for (let i = 0; i < slots.length; i++) {
      if (slots[i].classList.contains('locked')) continue;
      if (slots[i].classList.contains('filled')) {
        const tileIndex = parseInt(slots[i].dataset.tileIndex);
        $tileRow.children[tileIndex].classList.remove('used');
        slots[i].textContent = '';
        slots[i].classList.remove('filled');
        delete slots[i].dataset.tileIndex;
      }
    }
    placed = [];
    $submitBtn.classList.remove('active');
  }, 500);
}

// --- Timer ---
function startTimer() {
  stopTimer();
  timeLeft = TIMER_TOTAL;
  $timerBar.style.width = '100%';
  $timerBar.className = 'timer-bar';

  const startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    timeLeft = Math.max(0, TIMER_TOTAL - elapsed);
    const pct = (timeLeft / TIMER_TOTAL) * 100;
    $timerBar.style.width = pct + '%';

    if (pct < 33) {
      $timerBar.className = 'timer-bar danger';
    } else if (pct < 55) {
      $timerBar.className = 'timer-bar warning';
    } else {
      $timerBar.className = 'timer-bar';
    }

    // Hints
    if (!hintFirstShown && elapsed >= HINT_FIRST_LETTER_MS) {
      hintFirstShown = true;
      lockFirstLetter();
    }
    if (!hintDefShown && elapsed >= (TIMER_TOTAL - HINT_DEFINITION_MS)) {
      hintDefShown = true;
      showDefinitionHint();
    }

    if (timeLeft <= 0) {
      onTimeout();
    }
  }, 50);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function lockFirstLetter() {
  const firstLetter = currentWord[0];
  const slots = $answerRow.children;
  const slot = slots[0];

  // If slot 0 already has the correct letter, just lock it
  if (slot.classList.contains('filled') && slot.textContent.toLowerCase() === firstLetter) {
    slot.classList.add('locked');
    return;
  }

  // If slot 0 has a wrong letter, remove it
  if (slot.classList.contains('filled')) {
    const tileIndex = parseInt(slot.dataset.tileIndex);
    $tileRow.children[tileIndex].classList.remove('used');
    placed = placed.filter(p => p.pos !== 0);
  }

  // Find a tile with the right letter that isn't used
  const tiles = $tileRow.children;
  for (let i = 0; i < tiles.length; i++) {
    if (!tiles[i].classList.contains('used') && tiles[i].dataset.letter.toLowerCase() === firstLetter) {
      tiles[i].classList.add('used');
      slot.textContent = tiles[i].dataset.letter;
      slot.classList.add('filled', 'locked');
      slot.dataset.tileIndex = i;
      break;
    }
  }

  lockedPositions.push(0);
  checkAllFilled();
}

function showDefinitionHint() {
  $hintArea.innerHTML = `<div class="hint-text">Hint: ${currentHint}</div>`;
}

function onTimeout() {
  stopTimer();
  lives--;
  updateHUD();
  showFeedback(`${currentWord.toUpperCase()}`, 'timeout');

  // Reveal answer
  const slots = $answerRow.children;
  for (let i = 0; i < slots.length; i++) {
    slots[i].textContent = currentWord[i].toUpperCase();
    slots[i].classList.add('filled');
    slots[i].style.borderColor = '#f59e0b';
    slots[i].style.background = 'rgba(245,158,11,0.2)';
  }

  if (lives <= 0) {
    setTimeout(() => showGameOver(), 1500);
  } else {
    setTimeout(() => {
      wordIndex++;
      loadWord();
    }, 2000);
  }
}

// --- HUD ---
function updateHUD() {
  $score.textContent = score;
  $levelBadge.textContent = `Level ${level}`;

  const lifeSpans = $lives.children;
  for (let i = 0; i < lifeSpans.length; i++) {
    if (i < lives) {
      lifeSpans[i].classList.remove('lost');
    } else {
      lifeSpans[i].classList.add('lost');
    }
  }
}

// --- Feedback ---
function showFeedback(text, type) {
  const el = document.createElement('div');
  el.className = `feedback ${type}`;
  el.textContent = text;
  $playArea.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// --- Confetti ---
function spawnConfetti() {
  const colors = ['#22c55e', '#4ade80', '#fbbf24', '#60a5fa', '#f472b6', '#a78bfa'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (Math.random() * 100) + 'vw';
    piece.style.top = (Math.random() * 30 + 10) + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 1500);
  }
}

// --- Modals ---
function showLevelComplete() {
  stopTimer();
  const stars = score > level * 2000 ? 3 : score > level * 1200 ? 2 : 1;
  $modalTitle.textContent = level < 4 ? 'Level Complete!' : 'You Win!';
  $modalStars.textContent = Array(stars).fill('\u2B50').join('');
  $modalScore.textContent = `Score: ${score}`;
  $modalText.textContent = level < 4 ? 'Ready for harder words?' : 'You conquered all the words!';
  $modalBtn.textContent = level < 4 ? 'Next Level \u2192' : 'Play Again';
  $modalBtn.onclick = () => {
    $modal.classList.add('hidden');
    if (level < 4) {
      level++;
      startLevel();
    } else {
      level = 1;
      score = 0;
      lives = 3;
      updateHUD();
      startLevel();
    }
  };
  $modal.classList.remove('hidden');
}

function showGameOver() {
  stopTimer();
  $modalTitle.textContent = 'Game Over';
  $modalStars.textContent = '';
  $modalScore.textContent = `Final Score: ${score}`;
  $modalText.textContent = `You reached Level ${level}, Word ${wordIndex + 1}`;
  $modalBtn.textContent = 'Try Again';
  $modalBtn.onclick = () => {
    $modal.classList.add('hidden');
    level = 1;
    score = 0;
    lives = 3;
    updateHUD();
    startLevel();
  };
  $modal.classList.remove('hidden');
}

// --- Start Screen ---
function showStartScreen() {
  $modalTitle.textContent = 'Word Scramble';
  $modalStars.textContent = '\uD83D\uDD24';
  $modalScore.textContent = '';
  $modalText.textContent = 'Unscramble the letters to form words! Tap letters to place them.';
  $modalBtn.textContent = 'Start';
  $modalBtn.onclick = () => {
    $modal.classList.add('hidden');
    startLevel();
  };
  $modal.classList.remove('hidden');
}

// --- Init ---
showStartScreen();
</script>
</body>
</html>
