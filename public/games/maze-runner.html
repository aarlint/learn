<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Number Collector</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(180deg, #dbeafe 0%, #bfdbfe 50%, #93c5fd 100%);
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.game-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(255,255,255,0.5);
  gap: 8px;
}

.hud-left, .hud-right {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.95rem;
  font-weight: 700;
  color: #1d4ed8;
  white-space: nowrap;
}

.hud-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 1;
  min-width: 0;
}

.level-badge {
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  color: white;
  padding: 4px 14px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 800;
  box-shadow: 0 2px 10px rgba(37, 99, 235, 0.4);
  white-space: nowrap;
}

.challenge-label {
  font-size: 0.7rem;
  color: #3b82f6;
  font-weight: 600;
  margin-top: 2px;
}

.backpack {
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  padding: 4px 10px;
  font-size: 0.9rem;
  font-weight: 700;
  color: #1d4ed8;
  display: flex;
  align-items: center;
  gap: 4px;
}

.backpack .equation {
  color: #2563eb;
  font-family: 'Courier New', monospace;
  font-size: 0.95rem;
}

.backpack .target {
  color: #9333ea;
  font-weight: 800;
}

.score-icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.arena-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: 8px;
}

canvas {
  display: block;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 8px 12px 16px;
}

.d-pad {
  display: grid;
  grid-template-areas:
    ". up ."
    "left . right"
    ". down .";
  gap: 6px;
}

.d-btn {
  width: 62px;
  height: 62px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(6px);
  font-size: 1.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: transform 0.08s, background 0.08s;
  color: #1d4ed8;
}

.d-btn:active {
  transform: scale(0.9);
  background: rgba(59, 130, 246, 0.3);
}

.d-btn.up    { grid-area: up; }
.d-btn.left  { grid-area: left; }
.d-btn.right { grid-area: right; }
.d-btn.down  { grid-area: down; }

/* Feedback overlay */
.feedback {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.2rem;
  font-weight: 800;
  z-index: 20;
  animation: popIn 0.8s ease-out forwards;
  text-shadow: 0 4px 15px rgba(0,0,0,0.2);
  pointer-events: none;
  white-space: nowrap;
}

.feedback.correct { color: #22c55e; }
.feedback.wrong { color: #ef4444; }

@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.shake { animation: shake 0.4s ease-out; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: white;
  border-radius: 24px;
  padding: 28px 36px;
  text-align: center;
  max-width: 90%;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal h2 {
  font-size: 1.7rem;
  color: #1d4ed8;
  margin-bottom: 6px;
}

.modal .stars {
  font-size: 2.5rem;
  margin: 10px 0;
}

.modal p {
  color: #666;
  margin-bottom: 18px;
  font-size: 1rem;
}

.modal button {
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  color: white;
  border: none;
  padding: 14px 36px;
  border-radius: 50px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s;
}

.modal button:active { transform: scale(0.95); }

.hidden { display: none !important; }

/* Countdown */
.countdown-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  pointer-events: none;
}

.countdown-text {
  font-size: 3.5rem;
  font-weight: 900;
  color: #1d4ed8;
  text-shadow: 0 4px 20px rgba(0,0,0,0.15);
  animation: countPulse 0.6s ease-out;
}

@keyframes countPulse {
  0% { transform: scale(2); opacity: 0; }
  50% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="hud-left">
      <svg class="score-icon" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span id="score">0</span>
    </div>
    <div class="hud-center">
      <div class="level-badge">Level <span id="levelNum">1</span></div>
      <div class="challenge-label" id="challengeLabel">Find the Number!</div>
    </div>
    <div class="hud-right">
      <div class="backpack">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        <span class="equation" id="equation">0</span>
        <span>/</span>
        <span class="target" id="targetDisplay">3</span>
      </div>
    </div>
  </div>

  <div class="arena-area">
    <canvas id="arena"></canvas>
    <div id="feedback" class="feedback hidden"></div>
    <div id="countdown" class="countdown-overlay hidden">
      <div class="countdown-text" id="countdownText"></div>
    </div>
  </div>

  <div class="controls">
    <div class="d-pad">
      <button class="d-btn up" id="btnUp">&#9650;</button>
      <button class="d-btn left" id="btnLeft">&#9664;</button>
      <button class="d-btn right" id="btnRight">&#9654;</button>
      <button class="d-btn down" id="btnDown">&#9660;</button>
    </div>
  </div>
</div>

<div id="levelModal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Great Job!</h2>
    <div class="stars" id="modalStars"></div>
    <p id="modalText"></p>
    <button id="nextBtn">Next Level!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');

// ── Level configs ──────────────────────────────
// Type 1: "Find the Number!" (levels 1-3) - small arena, positive only, target is a single number
// Type 2: "Add It Up!" (levels 4-7) - medium arena, positives + small negatives
// Type 3: "Plus and Minus!" (levels 8-10) - larger arena, more negatives, strategy needed
const levels = [
  // Type 1: Find the Number!
  { cols: 6,  rows: 6,  type: 1, label: 'Find the Number!', target: 3,  tokenCount: 8 },
  { cols: 7,  rows: 7,  type: 1, label: 'Find the Number!', target: 5,  tokenCount: 10 },
  { cols: 8,  rows: 8,  type: 1, label: 'Find the Number!', target: 7,  tokenCount: 12 },
  // Type 2: Add It Up!
  { cols: 8,  rows: 8,  type: 2, label: 'Add It Up!',       target: 5,  tokenCount: 12 },
  { cols: 9,  rows: 9,  type: 2, label: 'Add It Up!',       target: 7,  tokenCount: 14 },
  { cols: 10, rows: 10, type: 2, label: 'Add It Up!',       target: 9,  tokenCount: 16 },
  { cols: 10, rows: 10, type: 2, label: 'Add It Up!',       target: 10, tokenCount: 16 },
  // Type 3: Plus and Minus!
  { cols: 11, rows: 11, type: 3, label: 'Plus and Minus!',  target: 10, tokenCount: 20 },
  { cols: 12, rows: 12, type: 3, label: 'Plus and Minus!',  target: 12, tokenCount: 22 },
  { cols: 12, rows: 12, type: 3, label: 'Plus and Minus!',  target: 15, tokenCount: 24 },
];

// ── State ──────────────────────────────────────
let level = 0;
let score = 0;
let cols, rows;
let cellSize;
let playerCol = 0, playerRow = 0;
let exitCol, exitRow;
let gameRunning = false;
let animating = false;
let playerX, playerY;
let targetX, targetY;

// Math challenge state
let tokens = [];           // {col, row, value, collected, bobOffset}
let collectedNumbers = []; // ordered list of collected values
let currentTotal = 0;
let targetNumber = 0;
let gateOpen = false;

// Animations
let collectAnimations = []; // {x, y, text, color, startTime}
let sparkles = [];          // {x, y, startTime}

// ── Movement: boundary check only (no walls!) ──
function canMove(dir) {
  if (dir === 'up')    return playerRow > 0;
  if (dir === 'down')  return playerRow < rows - 1;
  if (dir === 'left')  return playerCol > 0;
  if (dir === 'right') return playerCol < cols - 1;
  return false;
}

// ── Place number tokens ────────────────────────
function placeTokens() {
  tokens = [];
  collectedNumbers = [];
  currentTotal = 0;
  gateOpen = false;

  const cfg = levels[level];
  targetNumber = cfg.target;
  const type = cfg.type;

  // Build set of reserved positions (player start + exit)
  const reserved = new Set();
  reserved.add('0,0');
  reserved.add(`${exitCol},${exitRow}`);

  // All available positions
  const available = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const key = `${c},${r}`;
      if (!reserved.has(key)) available.push(key);
    }
  }
  // Shuffle
  for (let i = available.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [available[i], available[j]] = [available[j], available[i]];
  }

  let values = [];

  if (type === 1) {
    // "Find the Number!" - one correct number, rest are positive distractors
    values.push(targetNumber);
    const distractors = [];
    for (let n = 1; n <= 9; n++) {
      if (n !== targetNumber) distractors.push(n);
    }
    shuffle(distractors);
    const numDistractors = Math.min(cfg.tokenCount - 1, distractors.length);
    for (let i = 0; i < numDistractors; i++) values.push(distractors[i]);

  } else if (type === 2) {
    // "Add It Up!" - need 2+ numbers that sum to target, plus distractors and a few negatives
    const a = randInt(1, targetNumber - 1);
    const b = targetNumber - a;
    values.push(a, b);
    // Add some positive distractors
    const distractors = [];
    for (let n = 1; n <= 9; n++) distractors.push(n);
    shuffle(distractors);
    const numPos = Math.min(Math.floor((cfg.tokenCount - 2) * 0.6), distractors.length);
    for (let i = 0; i < numPos; i++) values.push(distractors[i]);
    // Add a few small negatives for undo
    const numNeg = cfg.tokenCount - values.length;
    for (let i = 0; i < numNeg; i++) values.push(-randInt(1, 3));

  } else {
    // "Plus and Minus!" - multiple ways to reach target, lots of positives and negatives
    // Guarantee a valid solution set of 3 positives
    const maxVal = Math.min(9, targetNumber - 2);
    const a = randInt(1, maxVal);
    const remaining = targetNumber - a;
    const maxB = Math.min(9, remaining - 1);
    const b = randInt(1, maxB);
    const c = remaining - b;
    values.push(a, b, c);
    // Mix of extra positives and negatives
    const extras = cfg.tokenCount - 3;
    const numNeg = Math.floor(extras * 0.4);
    const numPos = extras - numNeg;
    for (let i = 0; i < numPos; i++) values.push(randInt(1, 9));
    for (let i = 0; i < numNeg; i++) values.push(-randInt(1, 5));
  }

  shuffle(values);

  // Place tokens on available cells
  const count = Math.min(values.length, available.length);
  for (let i = 0; i < count; i++) {
    const [c, r] = available[i].split(',').map(Number);
    tokens.push({
      col: c, row: r,
      value: values[i],
      collected: false,
      bobOffset: Math.random() * Math.PI * 2
    });
  }

  updateHUD();
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── HUD updates ────────────────────────────────
function updateHUD() {
  const eqEl = document.getElementById('equation');
  const targetEl = document.getElementById('targetDisplay');

  targetEl.textContent = targetNumber;

  if (collectedNumbers.length === 0) {
    eqEl.textContent = '0';
  } else {
    // Build equation string with proper +/- signs
    let eq = '' + collectedNumbers[0];
    for (let i = 1; i < collectedNumbers.length; i++) {
      const n = collectedNumbers[i];
      eq += n < 0 ? ' - ' + Math.abs(n) : ' + ' + n;
    }
    eqEl.textContent = eq + ' = ' + currentTotal;
  }
}

// ── Canvas sizing ──────────────────────────────
function sizeCanvas() {
  const area = canvas.parentElement;
  const maxW = area.clientWidth - 16;
  const maxH = area.clientHeight - 16;
  const dpr = window.devicePixelRatio || 1;

  const cs = Math.floor(Math.min(maxW / cols, maxH / rows));
  cellSize = cs;

  const w = cols * cs;
  const h = rows * cs;

  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Drawing ────────────────────────────────────
const bgColor = '#f0f7ff';
const gridLineColor = 'rgba(147, 197, 253, 0.35)';
const playerColor = '#3b82f6';

function draw() {
  const now = Date.now();
  const w = cols * cellSize;
  const h = rows * cellSize;

  ctx.save();

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);

  // Draw soft grid lines (no walls!)
  ctx.strokeStyle = gridLineColor;
  ctx.lineWidth = 1;
  for (let c = 1; c < cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c * cellSize, 0);
    ctx.lineTo(c * cellSize, h);
    ctx.stroke();
  }
  for (let r = 1; r < rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * cellSize);
    ctx.lineTo(w, r * cellSize);
    ctx.stroke();
  }

  // Draw exit gate
  drawGate(now);

  // Draw number tokens
  tokens.forEach(t => {
    if (t.collected) return;
    const tx = t.col * cellSize + cellSize / 2;
    const ty = t.row * cellSize + cellSize / 2;
    const bob = Math.sin(now * 0.003 + t.bobOffset) * cellSize * 0.04;
    const pulse = 1 + Math.sin(now * 0.004 + t.bobOffset) * 0.08;
    const radius = cellSize * 0.34 * pulse;

    const isNeg = t.value < 0;
    const color = isNeg ? '#ef4444' : '#22c55e';
    const displayValue = isNeg ? String(t.value) : String(t.value);

    // Circle background
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(tx, ty + bob, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // White inner circle
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(tx, ty + bob, radius * 0.75, 0, Math.PI * 2);
    ctx.fill();

    // Number text
    ctx.fillStyle = color;
    ctx.font = `bold ${cellSize * 0.34}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(displayValue, tx, ty + bob + 1);
  });

  // Draw collect animations
  collectAnimations = collectAnimations.filter(a => now - a.startTime < 800);
  collectAnimations.forEach(a => {
    const elapsed = now - a.startTime;
    const progress = elapsed / 800;
    const y = a.y - progress * cellSize * 0.8;
    const opacity = 1 - progress;
    const scale = 1 + progress * 0.5;

    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.font = `bold ${cellSize * 0.35 * scale}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = a.color;
    ctx.fillText(a.text, a.x, y);
    ctx.restore();
  });

  // Draw sparkles on gate when open
  if (gateOpen) {
    sparkles = sparkles.filter(s => now - s.startTime < 1000);
    sparkles.forEach(s => {
      const elapsed = now - s.startTime;
      const progress = elapsed / 1000;
      const opacity = 1 - progress;
      const size = cellSize * 0.06 * (1 - progress);
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(s.x, s.y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Generate new sparkles
    if (Math.random() < 0.3) {
      sparkles.push({
        x: exitCol * cellSize + Math.random() * cellSize,
        y: exitRow * cellSize + Math.random() * cellSize,
        startTime: now
      });
    }
  }

  // Draw player
  drawPlayer();

  // Outer border
  ctx.strokeStyle = 'rgba(147, 197, 253, 0.6)';
  ctx.lineWidth = 3;
  ctx.strokeRect(0, 0, w, h);

  ctx.restore();
}

function drawGate(now) {
  const ex = exitCol * cellSize;
  const ey = exitRow * cellSize;
  const pad = cellSize * 0.08;

  if (gateOpen) {
    // Green open gate with pulsing glow
    const glowPulse = 0.3 + Math.sin(now * 0.005) * 0.1;
    ctx.fillStyle = `rgba(34, 197, 94, ${glowPulse})`;
    ctx.fillRect(ex + pad, ey + pad, cellSize - pad * 2, cellSize - pad * 2);

    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = Math.max(2, cellSize * 0.06);
    ctx.strokeRect(ex + pad, ey + pad, cellSize - pad * 2, cellSize - pad * 2);

    // Checkmark
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = Math.max(3, cellSize * 0.08);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(ex + cellSize * 0.25, ey + cellSize * 0.5);
    ctx.lineTo(ex + cellSize * 0.42, ey + cellSize * 0.68);
    ctx.lineTo(ex + cellSize * 0.75, ey + cellSize * 0.32);
    ctx.stroke();
  } else {
    // Gray locked gate
    ctx.fillStyle = 'rgba(156, 163, 175, 0.2)';
    ctx.fillRect(ex + pad, ey + pad, cellSize - pad * 2, cellSize - pad * 2);

    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = Math.max(2, cellSize * 0.06);
    ctx.strokeRect(ex + pad, ey + pad, cellSize - pad * 2, cellSize - pad * 2);

    // Lock icon
    ctx.fillStyle = '#9ca3af';
    ctx.font = `bold ${cellSize * 0.35}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F512}', ex + cellSize / 2, ey + cellSize / 2);
  }
}

function drawPlayer() {
  const pr = cellSize * 0.32;
  const cx = playerX + cellSize / 2;
  const cy = playerY + cellSize / 2;

  ctx.fillStyle = playerColor;
  ctx.shadowColor = 'rgba(59,130,246,0.4)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(cx, cy, pr, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx - pr * 0.3, cy - pr * 0.15, pr * 0.18, 0, Math.PI * 2);
  ctx.arc(cx + pr * 0.3, cy - pr * 0.15, pr * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1e3a5f';
  ctx.beginPath();
  ctx.arc(cx - pr * 0.3, cy - pr * 0.15, pr * 0.09, 0, Math.PI * 2);
  ctx.arc(cx + pr * 0.3, cy - pr * 0.15, pr * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#1e3a5f';
  ctx.lineWidth = Math.max(1.5, pr * 0.1);
  ctx.beginPath();
  ctx.arc(cx, cy + pr * 0.05, pr * 0.25, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
}

// ── Movement ───────────────────────────────────
function movePlayer(dir) {
  if (!gameRunning || animating) return;
  if (!canMove(dir)) return;

  let newCol = playerCol;
  let newRow = playerRow;

  if (dir === 'up') newRow--;
  if (dir === 'down') newRow++;
  if (dir === 'left') newCol--;
  if (dir === 'right') newCol++;

  playerCol = newCol;
  playerRow = newRow;

  targetX = newCol * cellSize;
  targetY = newRow * cellSize;
  animating = true;

  animateMove();
}

function animateMove() {
  const dx = targetX - playerX;
  const dy = targetY - playerY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 2) {
    playerX = targetX;
    playerY = targetY;
    animating = false;
    checkCell();
    return;
  }

  const speed = Math.max(dist * 0.3, 2);
  playerX += (dx / dist) * speed;
  playerY += (dy / dist) * speed;

  draw();
  requestAnimationFrame(animateMove);
}

function checkCell() {
  // Check number tokens
  tokens.forEach(t => {
    if (!t.collected && t.col === playerCol && t.row === playerRow) {
      t.collected = true;
      collectedNumbers.push(t.value);
      currentTotal += t.value;
      updateHUD();

      // Collect animation
      const tx = t.col * cellSize + cellSize / 2;
      const ty = t.row * cellSize + cellSize / 2;
      const isNeg = t.value < 0;
      collectAnimations.push({
        x: tx, y: ty,
        text: isNeg ? String(t.value) : '+' + t.value,
        color: isNeg ? '#ef4444' : '#22c55e',
        startTime: Date.now()
      });

      // Check if total matches target
      if (currentTotal === targetNumber && !gateOpen) {
        gateOpen = true;
        showFeedback('Gate Open!', 'correct');
        for (let i = 0; i < 8; i++) {
          sparkles.push({
            x: exitCol * cellSize + Math.random() * cellSize,
            y: exitRow * cellSize + Math.random() * cellSize,
            startTime: Date.now() + i * 50
          });
        }
      }
      // If total drifts away from target after gate was open, lock it again
      if (currentTotal !== targetNumber && gateOpen) {
        gateOpen = false;
      }
    }
  });

  // Check exit
  if (playerCol === exitCol && playerRow === exitRow && gateOpen) {
    gameRunning = false;
    score += 50 + 25 * collectedNumbers.length;
    document.getElementById('score').textContent = score;
    setTimeout(showLevelComplete, 300);
  }

  draw();
}

function showFeedback(text, type) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.className = 'feedback ' + type;
  setTimeout(() => el.classList.add('hidden'), 800);
}

// ── Level complete ─────────────────────────────
function showLevelComplete() {
  const cfg = levels[level];
  const minCollects = cfg.type === 1 ? 1 : cfg.type === 2 ? 2 : 3;
  const stars = collectedNumbers.length <= minCollects + 1 ? 3 : collectedNumbers.length <= minCollects + 3 ? 2 : 1;

  document.getElementById('modalTitle').textContent = 'Great Job!';
  document.getElementById('modalStars').innerHTML =
    '<svg width="40" height="40" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'.repeat(stars);

  // Build equation string
  let eq = '' + collectedNumbers[0];
  for (let i = 1; i < collectedNumbers.length; i++) {
    const n = collectedNumbers[i];
    eq += n < 0 ? ' - ' + Math.abs(n) : ' + ' + n;
  }
  eq += ' = ' + targetNumber;
  document.getElementById('modalText').textContent = eq;

  const isLastLevel = level >= levels.length - 1;
  document.getElementById('nextBtn').textContent = isLastLevel ? 'Play Again!' : 'Next Level!';

  document.getElementById('levelModal').classList.remove('hidden');
}

// ── Start level ────────────────────────────────
function startLevel() {
  const cfg = levels[level];
  cols = cfg.cols;
  rows = cfg.rows;

  document.getElementById('levelNum').textContent = level + 1;
  document.getElementById('challengeLabel').textContent = cfg.label;

  playerCol = 0;
  playerRow = 0;
  exitCol = cols - 1;
  exitRow = rows - 1;

  placeTokens();
  sizeCanvas();

  playerX = 0;
  playerY = 0;
  targetX = 0;
  targetY = 0;
  animating = false;
  collectAnimations = [];
  sparkles = [];

  draw();

  showCountdown(() => {
    gameRunning = true;
  });
}

function showCountdown(cb) {
  const overlay = document.getElementById('countdown');
  const text = document.getElementById('countdownText');
  overlay.classList.remove('hidden');
  text.textContent = 'GO!';
  text.style.animation = 'none';
  void text.offsetWidth;
  text.style.animation = 'countPulse 0.6s ease-out';
  setTimeout(() => {
    overlay.classList.add('hidden');
    cb();
  }, 700);
}

// ── Controls: D-pad ────────────────────────────
document.getElementById('btnUp').addEventListener('click', () => movePlayer('up'));
document.getElementById('btnDown').addEventListener('click', () => movePlayer('down'));
document.getElementById('btnLeft').addEventListener('click', () => movePlayer('left'));
document.getElementById('btnRight').addEventListener('click', () => movePlayer('right'));

// ── Controls: Keyboard ─────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); movePlayer('up'); }
  if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); movePlayer('down'); }
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); movePlayer('left'); }
  if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); movePlayer('right'); }
});

// ── Controls: Swipe ────────────────────────────
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', (e) => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 20) return;

  if (absDx > absDy) {
    movePlayer(dx > 0 ? 'right' : 'left');
  } else {
    movePlayer(dy > 0 ? 'down' : 'up');
  }
});

// ── Next level button ──────────────────────────
document.getElementById('nextBtn').addEventListener('click', () => {
  document.getElementById('levelModal').classList.add('hidden');
  if (level >= levels.length - 1) {
    level = 0;
    score = 0;
    document.getElementById('score').textContent = '0';
  } else {
    level++;
  }
  startLevel();
});

// ── Resize handling ────────────────────────────
window.addEventListener('resize', () => {
  sizeCanvas();
  playerX = playerCol * cellSize;
  playerY = playerRow * cellSize;
  targetX = playerX;
  targetY = playerY;
  draw();
});

// ── Animation loop ─────────────────────────────
function renderLoop() {
  if (gameRunning || collectAnimations.length > 0 || sparkles.length > 0) {
    draw();
  }
  requestAnimationFrame(renderLoop);
}

// ── Init ───────────────────────────────────────
startLevel();
renderLoop();
</script>
</body>
