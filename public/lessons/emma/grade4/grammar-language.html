<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Grammar & Language - 4th Grade</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #14b8a6;
  --teal-light: #f0fdfa;
  --purple: #a48bdb;
  --mint: #2DD4A8;
  --mint-light: #ECFDF5;
  --coral: #FF6B6B;
  --coral-light: #FFF0F0;
  --sky: #3fc1f0;
  --sun: #FFD93D;
  --bg: #FEFCF9;
  --card: #FFFFFF;
  --text: #1E293B;
  --text-mid: #475569;
  --border: #E2E8F0;
  --shadow: 0 8px 30px rgba(0,0,0,0.06);
  --radius: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
.app { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
.header { text-align: center; padding: 16px 0; }
.header h1 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; background: linear-gradient(135deg, var(--teal), var(--sky)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: var(--text-mid); font-size: 0.9rem; }

.progress-bar { height: 8px; background: var(--border); border-radius: 10px; margin: 16px 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--sky)); transition: width 0.5s ease; }

.score-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
.score-item { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--card); border: 1.5px solid var(--border); border-radius: 50px; font-weight: 700; font-size: 0.95rem; }

.card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.card h2 { font-family: 'Baloo 2', cursive; font-size: 1.2rem; margin-bottom: 8px; color: var(--teal); }
.card p { color: var(--text-mid); margin-bottom: 12px; font-size: 0.95rem; }

.problem-area { background: var(--teal-light); border-radius: 16px; padding: 24px; margin-bottom: 16px; }

.sentence { font-size: 1.2rem; line-height: 1.8; margin-bottom: 12px; }
.sentence .highlight { background: var(--sun); padding: 2px 6px; border-radius: 4px; font-weight: 700; }
.sentence .blank { display: inline-block; min-width: 80px; border-bottom: 3px solid var(--teal); margin: 0 4px; }

.choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.choices.single { grid-template-columns: 1fr; }
.choice-btn { padding: 14px; background: white; border: 2px solid var(--border); border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: left; }
.choice-btn:active { transform: scale(0.98); }
.choice-btn.correct { background: var(--mint-light); border-color: var(--mint); color: #059669; }
.choice-btn.wrong { background: var(--coral-light); border-color: var(--coral); color: var(--coral); }

.feedback { padding: 16px; border-radius: 14px; text-align: center; margin-top: 16px; font-weight: 700; }
.feedback.correct { background: var(--mint-light); color: #059669; }
.feedback.wrong { background: var(--coral-light); color: var(--coral); }

.topic-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.topic-tab { padding: 8px 14px; background: var(--card); border: 1.5px solid var(--border); border-radius: 50px; font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
.topic-tab.active { background: var(--teal); color: white; border-color: var(--teal); }

.tip-box { background: var(--sun); color: #92400e; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; margin-top: 12px; }
.tip-box strong { display: block; margin-bottom: 4px; }

.example-box { background: white; border: 2px dashed var(--teal); border-radius: 12px; padding: 12px; margin: 12px 0; font-size: 0.95rem; }
.example-box .label { font-weight: 700; color: var(--teal); margin-bottom: 4px; }

.btn { padding: 14px 32px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; }
.btn-primary { background: var(--teal); color: white; }

.hidden { display: none !important; }
.complete-screen { text-align: center; padding: 40px 20px; }
.complete-screen .icon { font-size: 4rem; margin-bottom: 16px; }
.complete-screen h2 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; color: var(--teal); }
.complete-screen p { color: var(--text-mid); margin-bottom: 24px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📝 Grammar & Language</h1>
    <p>4th Grade • Parts of Speech & Sentences</p>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="score-row">
    <div class="score-item">⭐ <span id="stars">0</span></div>
    <div class="score-item">🔥 <span id="streak">0</span></div>
  </div>

  <div class="topic-tabs">
    <button class="topic-tab active" data-topic="nouns">Nouns</button>
    <button class="topic-tab" data-topic="verbs">Verbs</button>
    <button class="topic-tab" data-topic="adjectives">Adjectives</button>
    <button class="topic-tab" data-topic="punctuation">Punctuation</button>
  </div>

  <div class="card" id="problemCard">
    <h2 id="problemTitle">Parts of Speech</h2>
    <p id="problemInstructions">Identify the noun in this sentence.</p>
    
    <div class="problem-area" id="problemArea"></div>
    <div class="answer-section" id="answerSection"></div>
    <div class="feedback hidden" id="feedback"></div>
  </div>

  <div class="card hidden" id="completeCard">
    <div class="complete-screen">
      <div class="icon">🎉</div>
      <h2>Topic Complete!</h2>
      <p id="completeMsg"></p>
      <button class="btn btn-primary" onclick="nextTopic()">Continue</button>
    </div>
  </div>
</div>

<script>
const PROBLEMS_PER_TOPIC = 6;

const nounProblems = [
  { sentence: 'The <span class="highlight">dog</span> ran across the yard.', answer: 'dog', type: 'common', choices: ['dog', 'ran', 'across', 'the'] },
  { sentence: 'My <span class="highlight">sister</span> loves to read books.', answer: 'sister', type: 'common', choices: ['sister', 'loves', 'read', 'to'] },
  { sentence: '<span class="highlight">Sarah</span> went to the store yesterday.', answer: 'Sarah', type: 'proper', choices: ['Sarah', 'went', 'store', 'yesterday'] },
  { sentence: 'The children played at the <span class="highlight">park</span>.', answer: 'park', type: 'common', choices: ['park', 'played', 'children', 'the'] },
  { sentence: 'We visited <span class="highlight">New York</span> last summer.', answer: 'New York', type: 'proper', choices: ['New York', 'visited', 'last', 'summer'] },
  { sentence: 'The <span class="highlight">happiness</span> on her face was clear.', answer: 'happiness', type: 'abstract', choices: ['happiness', 'face', 'clear', 'was'] },
  { sentence: 'A flock of <span class="highlight">birds</span> flew overhead.', answer: 'birds', type: 'common', choices: ['birds', 'flew', 'flock', 'overhead'] },
  { sentence: '<span class="highlight">Dr. Smith</span> examined the patient carefully.', answer: 'Dr. Smith', type: 'proper', choices: ['Dr. Smith', 'examined', 'carefully', 'patient'] },
];

const verbProblems = [
  { sentence: 'The cat <span class="highlight">sleeps</span> on the couch.', answer: 'sleeps', tense: 'present', choices: ['sleeps', 'cat', 'couch', 'the'] },
  { sentence: 'Yesterday, we <span class="highlight">played</span> soccer.', answer: 'played', tense: 'past', choices: ['played', 'soccer', 'yesterday', 'we'] },
  { sentence: 'She <span class="highlight">will visit</span> her grandma tomorrow.', answer: 'will visit', tense: 'future', choices: ['will visit', 'grandma', 'tomorrow', 'her'] },
  { sentence: 'The birds <span class="highlight">are singing</span> in the trees.', answer: 'are singing', tense: 'present progressive', choices: ['are singing', 'birds', 'trees', 'in'] },
  { sentence: 'He <span class="highlight">wrote</span> a letter to his friend.', answer: 'wrote', tense: 'past', choices: ['wrote', 'letter', 'friend', 'his'] },
  { sentence: 'The sun <span class="highlight">rises</span> in the east.', answer: 'rises', tense: 'present', choices: ['rises', 'sun', 'east', 'the'] },
  { sentence: 'They <span class="highlight">have finished</span> their homework.', answer: 'have finished', tense: 'present perfect', choices: ['have finished', 'homework', 'their', 'they'] },
  { sentence: 'Mom <span class="highlight">is baking</span> cookies right now.', answer: 'is baking', tense: 'present progressive', choices: ['is baking', 'cookies', 'Mom', 'now'] },
];

const adjectiveProblems = [
  { sentence: 'The <span class="highlight">tall</span> tree swayed in the wind.', answer: 'tall', describes: 'tree', choices: ['tall', 'tree', 'wind', 'swayed'] },
  { sentence: 'She wore a <span class="highlight">beautiful</span> dress to the party.', answer: 'beautiful', describes: 'dress', choices: ['beautiful', 'dress', 'party', 'wore'] },
  { sentence: 'The <span class="highlight">hungry</span> bear searched for food.', answer: 'hungry', describes: 'bear', choices: ['hungry', 'bear', 'food', 'searched'] },
  { sentence: 'We had a <span class="highlight">delicious</span> dinner last night.', answer: 'delicious', describes: 'dinner', choices: ['delicious', 'dinner', 'night', 'had'] },
  { sentence: 'The <span class="highlight">old</span> house creaked in the storm.', answer: 'old', describes: 'house', choices: ['old', 'house', 'storm', 'creaked'] },
  { sentence: 'He has <span class="highlight">three</span> brothers.', answer: 'three', describes: 'brothers', choices: ['three', 'brothers', 'has', 'he'] },
  { sentence: 'The <span class="highlight">excited</span> children opened their gifts.', answer: 'excited', describes: 'children', choices: ['excited', 'children', 'gifts', 'opened'] },
  { sentence: 'A <span class="highlight">tiny</span> kitten played with yarn.', answer: 'tiny', describes: 'kitten', choices: ['tiny', 'kitten', 'yarn', 'played'] },
];

const punctuationProblems = [
  { sentence: 'What time is it<span class="blank"></span>', answer: '?', type: 'question', choices: ['.', '?', '!', ','] },
  { sentence: 'I love pizza<span class="blank"></span>', answer: '.', type: 'statement', choices: ['.', '?', '!', ';'] },
  { sentence: 'Watch out<span class="blank"></span>', answer: '!', type: 'exclamation', choices: ['.', '?', '!', ','] },
  { sentence: 'We need eggs<span class="blank"></span> milk<span class="blank"></span> and bread.', answer: ',', type: 'series', choices: ['.', '?', ',', ';'] },
  { sentence: 'Where are you going<span class="blank"></span>', answer: '?', type: 'question', choices: ['.', '?', '!', ':'] },
  { sentence: 'That was amazing<span class="blank"></span>', answer: '!', type: 'exclamation', choices: ['.', '?', '!', ','] },
  { sentence: 'The dog is brown<span class="blank"></span> fluffy<span class="blank"></span> and playful.', answer: ',', type: 'series', choices: ['.', ',', '!', ';'] },
  { sentence: 'Can you help me<span class="blank"></span>', answer: '?', type: 'question', choices: ['.', '?', '!', ','] },
];

const topics = {
  nouns: { title: 'Nouns', problems: nounProblems, instructions: 'Identify the highlighted noun:' },
  verbs: { title: 'Verbs', problems: verbProblems, instructions: 'Identify the highlighted verb:' },
  adjectives: { title: 'Adjectives', problems: adjectiveProblems, instructions: 'Identify the highlighted adjective:' },
  punctuation: { title: 'Punctuation', problems: punctuationProblems, instructions: 'Choose the correct punctuation:' },
};

let state = { topic: 'nouns', problemIdx: 0, problemNum: 0, stars: 0, streak: 0, answered: false, usedProblems: [] };

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRandomProblem() {
  const topic = topics[state.topic];
  const available = topic.problems.filter((_, i) => !state.usedProblems.includes(i));
  
  if (available.length === 0) {
    state.usedProblems = [];
    return topic.problems[randInt(0, topic.problems.length - 1)];
  }
  
  const idx = randInt(0, available.length - 1);
  const originalIdx = topic.problems.indexOf(available[idx]);
  state.usedProblems.push(originalIdx);
  return available[idx];
}

function renderProblem() {
  const topic = topics[state.topic];
  const problem = getRandomProblem();
  state.currentProblem = problem;
  state.answered = false;
  
  document.getElementById('problemTitle').textContent = topic.title;
  document.getElementById('problemInstructions').textContent = topic.instructions;
  document.getElementById('feedback').classList.add('hidden');
  
  const area = document.getElementById('problemArea');
  const answer = document.getElementById('answerSection');
  
  area.innerHTML = `<div class="sentence">${problem.sentence}</div>`;
  
  const shuffledChoices = shuffle(problem.choices);
  state.shuffledChoices = shuffledChoices;
  state.correctIdx = shuffledChoices.indexOf(problem.answer);
  
  answer.innerHTML = `<div class="choices">
    ${shuffledChoices.map((c, i) => `<button class="choice-btn" onclick="checkChoice(${i})">${c}</button>`).join('')}
  </div>`;
}

function checkChoice(idx) {
  if (state.answered) return;
  state.answered = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  const correct = idx === state.correctIdx;
  
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[state.correctIdx].classList.add('correct');
  
  showFeedback(correct);
}

function getTip() {
  const problem = state.currentProblem;
  
  if (state.topic === 'nouns') {
    if (problem.type === 'proper') return 'Proper nouns name specific people, places, or things and start with capital letters.';
    if (problem.type === 'abstract') return 'Abstract nouns name ideas or feelings you cannot touch, like happiness or courage.';
    return 'Common nouns name general people, places, or things.';
  }
  if (state.topic === 'verbs') {
    return `This verb is in the ${problem.tense} tense. Verbs show action or state of being.`;
  }
  if (state.topic === 'adjectives') {
    return `Adjectives describe nouns. "${problem.answer}" describes "${problem.describes}".`;
  }
  if (state.topic === 'punctuation') {
    if (problem.type === 'question') return 'Questions end with a question mark (?).';
    if (problem.type === 'exclamation') return 'Exclamations show strong feeling and end with (!).';
    if (problem.type === 'series') return 'Use commas to separate items in a list.';
    return 'Statements end with a period (.).';
  }
  return '';
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  
  if (correct) {
    state.stars++;
    state.streak++;
    fb.textContent = '✓ Correct! ' + ['Great!', 'Perfect!', 'Excellent!'][randInt(0, 2)];
    fb.className = 'feedback correct';
  } else {
    state.streak = 0;
    fb.innerHTML = `✗ The answer is "${state.currentProblem.answer}"<div class="tip-box"><strong>💡 Tip:</strong> ${getTip()}</div>`;
    fb.className = 'feedback wrong';
  }
  
  fb.classList.remove('hidden');
  updateUI();
  
  setTimeout(() => {
    state.problemNum++;
    if (state.problemNum >= PROBLEMS_PER_TOPIC) showComplete();
    else renderProblem();
  }, correct ? 1200 : 3000);
}

function updateUI() {
  document.getElementById('stars').textContent = state.stars;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('progressFill').style.width = ((state.problemNum + 1) / PROBLEMS_PER_TOPIC * 100) + '%';
}

function showComplete() {
  document.getElementById('problemCard').classList.add('hidden');
  document.getElementById('completeCard').classList.remove('hidden');
  document.getElementById('completeMsg').textContent = `You earned ${state.stars} stars in ${topics[state.topic].title}!`;
}

function nextTopic() {
  const keys = Object.keys(topics);
  const idx = keys.indexOf(state.topic);
  if (idx < keys.length - 1) setTopic(keys[idx + 1]);
  else {
    document.getElementById('completeCard').querySelector('.complete-screen').innerHTML = `
      <div class="icon">🏆</div><h2>All Complete!</h2>
      <p>Grammar expert! Stars: ${state.stars}</p>
      <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    `;
  }
}

function setTopic(topic) {
  state.topic = topic;
  state.problemNum = 0;
  state.usedProblems = [];
  document.querySelectorAll('.topic-tab').forEach(t => t.classList.toggle('active', t.dataset.topic === topic));
  document.getElementById('problemCard').classList.remove('hidden');
  document.getElementById('completeCard').classList.add('hidden');
  renderProblem();
  updateUI();
}

document.querySelectorAll('.topic-tab').forEach(t => t.addEventListener('click', () => setTopic(t.dataset.topic)));
renderProblem();
updateUI();
</script>
</body>
</html>
