<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Pop 🎈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(180deg, #fce7f3 0%, #fbcfe8 50%, #f9a8d4 100%);
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

.game-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* Top HUD */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(255,255,255,0.5);
}

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.1rem;
  font-weight: 700;
  color: #9333ea;
}

.stat-icon { font-size: 1.3rem; }
.stat-value { color: #c026d3; }

.target-number {
  background: linear-gradient(135deg, #c026d3, #9333ea);
  color: white;
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 1.3rem;
  font-weight: 800;
  box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
}

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Feedback */
.feedback {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  font-weight: 800;
  z-index: 20;
  animation: popIn 0.6s ease-out forwards;
  text-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.feedback.correct { color: #22c55e; }
.feedback.wrong { color: #ef4444; }
.feedback.bonus { color: #f59e0b; font-size: 2rem; }

@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { transform: translate(-50%, -50%) scale(1.3); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-40px); }
}

/* Level modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: white;
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  max-width: 90%;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.modal h2 {
  font-size: 1.8rem;
  color: #9333ea;
  margin-bottom: 8px;
}

.modal .stars {
  font-size: 2.5rem;
  margin: 12px 0;
}

.modal p {
  color: #666;
  margin-bottom: 20px;
}

.modal button {
  background: linear-gradient(135deg, #c026d3, #9333ea);
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 50px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s;
}

.modal button:active { transform: scale(0.95); }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="stat">
      <span class="stat-icon">⭐</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="target-number">Find: <span id="targetNum">5</span></div>
    <div class="stat">
      <span class="stat-icon">❤️</span>
      <span id="lives">3</span>
    </div>
  </div>
  
  <div class="canvas-wrapper">
    <canvas id="game"></canvas>
    <div id="feedback" class="feedback hidden"></div>
  </div>
</div>

<div id="levelModal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Great Job!</h2>
    <div class="stars" id="modalStars">⭐⭐⭐</div>
    <p id="modalText">You found all the numbers!</p>
    <button id="nextBtn">Play Again! 🎈</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game state
let score = 0;
let lives = 3;
let targetNumber = 5;
let level = 1;
let balloonsPopped = 0;
let balloons = [];
let particles = [];
let gameRunning = true;

// Balloon colors
const colors = [
  '#ef4444', '#f97316', '#eab308', '#22c55e', 
  '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6'
];

// Resize
function resize() {
  const wrapper = canvas.parentElement;
  canvas.width = wrapper.clientWidth * window.devicePixelRatio;
  canvas.height = wrapper.clientHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

// Spawn balloon
function spawnBalloon() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  // Decide if this balloon has the target number
  const isTarget = Math.random() < 0.3; // 30% chance
  let num;
  
  // Number range scales with level: 1-5, 1-7, 1-10
  const maxNum = level <= 1 ? 5 : level <= 2 ? 7 : 10;

  if (isTarget) {
    num = targetNumber;
  } else {
    // Random number that's NOT the target
    do {
      num = Math.floor(Math.random() * maxNum) + 1;
    } while (num === targetNumber);
  }
  
  balloons.push({
    x: Math.random() * (w - 80) + 40,
    y: h + 60,
    num: num,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: 1 + Math.random() * 1.5 + level * 0.2,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.02,
    radius: 35 + Math.random() * 10,
    popping: false,
    popScale: 1
  });
}

// Create particles
function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (3 + Math.random() * 3),
      vy: Math.sin(angle) * (3 + Math.random() * 3),
      radius: 5 + Math.random() * 5,
      color,
      life: 1
    });
  }
}

// Show feedback
function showFeedback(text, type) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.className = 'feedback ' + type;
  setTimeout(() => el.classList.add('hidden'), 600);
}

// Pop balloon
function popBalloon(balloon, correct) {
  balloon.popping = true;
  createParticles(balloon.x, balloon.y, balloon.color, 12);
  
  if (correct) {
    score += 10 * level;
    balloonsPopped++;
    showFeedback('🎉 Yes!', 'correct');
    
    // Check if level complete
    if (balloonsPopped >= 5 + level) {
      setTimeout(levelComplete, 500);
    }
  } else {
    lives--;
    showFeedback('Oops!', 'wrong');
    if (lives <= 0) {
      setTimeout(gameOver, 500);
    }
  }
  updateHUD();
}

// Update HUD
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('targetNum').textContent = targetNumber;
}

// Level complete
function levelComplete() {
  gameRunning = false;
  const modal = document.getElementById('levelModal');
  const title = document.getElementById('modalTitle');
  const stars = document.getElementById('modalStars');
  const text = document.getElementById('modalText');
  const btn = document.getElementById('nextBtn');
  
  title.textContent = 'Level ' + level + ' Complete!';
  const starCount = lives >= 3 ? 3 : lives >= 2 ? 2 : 1;
  stars.textContent = '⭐'.repeat(starCount);
  text.textContent = `You popped ${balloonsPopped} correct balloons!`;
  btn.textContent = 'Next Level! 🎈';
  
  score += lives * 50; // Bonus for remaining lives
  updateHUD();
  
  modal.classList.remove('hidden');
}

// Game over
function gameOver() {
  gameRunning = false;
  const modal = document.getElementById('levelModal');
  const title = document.getElementById('modalTitle');
  const stars = document.getElementById('modalStars');
  const text = document.getElementById('modalText');
  const btn = document.getElementById('nextBtn');
  
  title.textContent = 'Game Over!';
  stars.textContent = '💔';
  text.textContent = `Final score: ${score}`;
  btn.textContent = 'Try Again! 🎈';
  
  modal.classList.remove('hidden');
}

// Next level / restart
function nextLevel(restart = false) {
  if (restart) {
    level = 1;
    score = 0;
  } else {
    level++;
  }
  lives = 3;
  balloonsPopped = 0;
  balloons = [];
  particles = [];
  const maxNum = level <= 1 ? 5 : level <= 2 ? 7 : 10;
  targetNumber = Math.floor(Math.random() * maxNum) + 1;
  gameRunning = true;
  updateHUD();
  document.getElementById('levelModal').classList.add('hidden');
}

// Handle tap/click
function handleTap(e) {
  if (!gameRunning) return;
  
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  
  const x = (clientX - rect.left) * scaleX / window.devicePixelRatio;
  const y = (clientY - rect.top) * scaleY / window.devicePixelRatio;
  
  // Check balloon hits
  for (let i = balloons.length - 1; i >= 0; i--) {
    const b = balloons[i];
    if (b.popping) continue;
    
    const dx = x - b.x;
    const dy = y - b.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < b.radius) {
      popBalloon(b, b.num === targetNumber);
      break;
    }
  }
}

canvas.addEventListener('touchstart', handleTap, { passive: false });
canvas.addEventListener('click', handleTap);

document.getElementById('nextBtn').addEventListener('click', () => {
  const btn = document.getElementById('nextBtn');
  nextLevel(btn.textContent.includes('Try Again'));
});

// Draw balloon
function drawBalloon(b) {
  if (b.popping) return;
  
  ctx.save();
  ctx.translate(b.x, b.y);
  
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 5;
  
  // Balloon body
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.radius * 0.85, b.radius, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Shine
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-b.radius * 0.3, -b.radius * 0.3, b.radius * 0.2, b.radius * 0.15, -0.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Tie
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.moveTo(-6, b.radius);
  ctx.lineTo(6, b.radius);
  ctx.lineTo(0, b.radius + 10);
  ctx.closePath();
  ctx.fill();
  
  // String
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, b.radius + 10);
  ctx.quadraticCurveTo(Math.sin(b.wobble) * 10, b.radius + 40, 0, b.radius + 60);
  ctx.stroke();
  
  // Number
  ctx.fillStyle = 'white';
  ctx.font = `bold ${b.radius * 0.8}px system-ui`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 4;
  ctx.fillText(b.num, 0, 0);
  
  ctx.restore();
}

// Update
function update() {
  if (!gameRunning) return;
  
  const h = canvas.height / window.devicePixelRatio;
  
  // Spawn balloons
  if (Math.random() < 0.015 + level * 0.003) {
    spawnBalloon();
  }
  
  // Update balloons
  balloons = balloons.filter(b => {
    if (b.popping) return false;
    
    b.y -= b.speed;
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.5;
    
    // Remove if off screen (no penalty - too hard for kindergartners)
    if (b.y < -100) {
      return false;
    }
    return true;
  });
  
  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    return p.life > 0;
  });
}

// Draw
function draw() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  // Clear with gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#fce7f3');
  grad.addColorStop(0.5, '#fbcfe8');
  grad.addColorStop(1, '#f9a8d4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 180 + Date.now() * 0.01) % (w + 200)) - 100;
    const cy = 60 + i * 40;
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.arc(cx + 25, cy - 10, 25, 0, Math.PI * 2);
    ctx.arc(cx + 50, cy, 30, 0, Math.PI * 2);
    ctx.arc(cx + 25, cy + 10, 20, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Draw balloons
  balloons.forEach(drawBalloon);
  
  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Init
updateHUD();
gameLoop();
</script>
</body>
</html>
