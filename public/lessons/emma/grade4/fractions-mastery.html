<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fractions Mastery - 4th Grade</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #a48bdb;
  --purple-light: #f3f0ff;
  --mint: #2DD4A8;
  --mint-light: #ECFDF5;
  --coral: #FF6B6B;
  --coral-light: #FFF0F0;
  --sky: #3fc1f0;
  --sky-light: #EFF6FF;
  --sun: #FFD93D;
  --bg: #FEFCF9;
  --card: #FFFFFF;
  --text: #1E293B;
  --text-mid: #475569;
  --border: #E2E8F0;
  --shadow: 0 8px 30px rgba(0,0,0,0.06);
  --radius: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Nunito', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh;
  padding: 16px;
}
.app { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
.header { text-align: center; padding: 16px 0; }
.header h1 { 
  font-family: 'Baloo 2', cursive; 
  font-size: 1.8rem; 
  background: linear-gradient(135deg, var(--purple), #8b5cf6); 
  -webkit-background-clip: text; 
  -webkit-text-fill-color: transparent; 
}
.header p { color: var(--text-mid); font-size: 0.9rem; }

.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 10px;
  margin: 16px 0;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--mint));
  transition: width 0.5s ease;
}

.score-row {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}
.score-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
}

.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card h2 {
  font-family: 'Baloo 2', cursive;
  font-size: 1.2rem;
  margin-bottom: 8px;
  color: var(--purple);
}
.card p { color: var(--text-mid); margin-bottom: 12px; font-size: 0.95rem; }

.problem-area {
  background: var(--purple-light);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  margin-bottom: 16px;
}

.fraction-display {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  margin: 0 8px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.8rem;
  font-weight: 700;
}
.fraction-display .num { border-bottom: 3px solid var(--text); padding: 0 8px 4px; }
.fraction-display .den { padding: 4px 8px 0; }

.operator {
  font-family: 'Baloo 2', cursive;
  font-size: 2rem;
  font-weight: 700;
  margin: 0 6px;
  color: var(--purple);
}

.equation-row {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 4px;
}

.visual-fractions {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 16px 0;
  flex-wrap: wrap;
}

.pie-visual {
  position: relative;
  width: 80px;
  height: 80px;
}

.pie-visual svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.answer-section {
  margin-top: 16px;
}

.fraction-input-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

.fraction-input {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.fraction-input input {
  width: 60px;
  padding: 10px;
  font-size: 1.3rem;
  font-family: 'Baloo 2', cursive;
  text-align: center;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: white;
}
.fraction-input input:focus { outline: none; border-color: var(--purple); }

.fraction-input .line {
  width: 50px;
  height: 3px;
  background: var(--text);
}

.choices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.choice-btn {
  padding: 16px;
  background: white;
  border: 2px solid var(--border);
  border-radius: 14px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
}
.choice-btn:active { transform: scale(0.96); }
.choice-btn.correct { background: var(--mint-light); border-color: var(--mint); color: var(--mint); }
.choice-btn.wrong { background: var(--coral-light); border-color: var(--coral); color: var(--coral); }

.btn {
  padding: 14px 32px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.1rem;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--purple); color: white; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-primary:active { transform: scale(0.96); }

.feedback {
  padding: 16px;
  border-radius: 14px;
  text-align: center;
  margin-top: 16px;
  font-weight: 700;
}
.feedback.correct { background: var(--mint-light); color: #059669; }
.feedback.wrong { background: var(--coral-light); color: var(--coral); }
.feedback.info { background: var(--sky-light); color: #0284c7; }

.topic-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.topic-tab {
  padding: 8px 16px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.topic-tab.active { background: var(--purple); color: white; border-color: var(--purple); }

.hidden { display: none !important; }

.complete-screen {
  text-align: center;
  padding: 40px 20px;
}
.complete-screen .icon { font-size: 4rem; margin-bottom: 16px; }
.complete-screen h2 { font-family: 'Baloo 2', cursive; font-size: 1.8rem; color: var(--purple); margin-bottom: 8px; }
.complete-screen p { color: var(--text-mid); margin-bottom: 24px; }

.tip-box {
  background: var(--sun);
  color: #92400e;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 0.9rem;
  margin-top: 12px;
}
.tip-box strong { display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🥧 Fractions Mastery</h1>
    <p>4th Grade • Adding & Comparing Fractions</p>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="score-row">
    <div class="score-item">⭐ <span id="stars">0</span></div>
    <div class="score-item">🔥 <span id="streak">0</span></div>
  </div>

  <div class="topic-tabs" id="topicTabs">
    <button class="topic-tab active" data-topic="compare">Compare</button>
    <button class="topic-tab" data-topic="equivalent">Equivalent</button>
    <button class="topic-tab" data-topic="add-same">Add (Same)</button>
    <button class="topic-tab" data-topic="add-diff">Add (Different)</button>
  </div>

  <div class="card" id="problemCard">
    <h2 id="problemTitle">Comparing Fractions</h2>
    <p id="problemInstructions">Which fraction is greater?</p>
    
    <div class="problem-area" id="problemArea">
      <!-- Problem content injected here -->
    </div>

    <div class="answer-section" id="answerSection">
      <!-- Answer options injected here -->
    </div>

    <div class="feedback hidden" id="feedback"></div>
  </div>

  <div class="card hidden" id="completeCard">
    <div class="complete-screen">
      <div class="icon">🎉</div>
      <h2>Topic Complete!</h2>
      <p id="completeMsg">You mastered this section!</p>
      <button class="btn btn-primary" onclick="nextTopic()">Continue</button>
    </div>
  </div>
</div>

<script>
const PROBLEMS_PER_TOPIC = 6;

const topics = {
  compare: {
    title: 'Comparing Fractions',
    instructions: 'Which fraction is greater?',
    generate: generateCompareProblem,
  },
  equivalent: {
    title: 'Equivalent Fractions',
    instructions: 'Find the equivalent fraction',
    generate: generateEquivalentProblem,
  },
  'add-same': {
    title: 'Adding (Same Denominator)',
    instructions: 'Add these fractions',
    generate: generateAddSameProblem,
  },
  'add-diff': {
    title: 'Adding (Different Denominators)',
    instructions: 'Add these fractions (find common denominator first!)',
    generate: generateAddDiffProblem,
  },
};

let state = {
  topic: 'compare',
  problem: null,
  problemNum: 0,
  stars: 0,
  streak: 0,
  answered: false,
};

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function simplify(num, den) {
  const g = gcd(Math.abs(num), Math.abs(den));
  return [num / g, den / g];
}
function lcm(a, b) { return (a * b) / gcd(a, b); }

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateCompareProblem() {
  // Generate two fractions with different values
  const den1 = randInt(2, 8);
  const num1 = randInt(1, den1 - 1);
  let den2 = randInt(2, 8);
  let num2 = randInt(1, den2 - 1);
  
  // Make sure they're different values
  while (num1 / den1 === num2 / den2) {
    den2 = randInt(2, 8);
    num2 = randInt(1, den2 - 1);
  }
  
  const val1 = num1 / den1;
  const val2 = num2 / den2;
  const answer = val1 > val2 ? 'left' : 'right';
  
  return {
    type: 'compare',
    frac1: [num1, den1],
    frac2: [num2, den2],
    answer,
    tip: val1 > val2 
      ? `${num1}/${den1} = ${(val1 * 100).toFixed(0)}% and ${num2}/${den2} = ${(val2 * 100).toFixed(0)}%`
      : `${num2}/${den2} = ${(val2 * 100).toFixed(0)}% and ${num1}/${den1} = ${(val1 * 100).toFixed(0)}%`,
  };
}

function generateEquivalentProblem() {
  const den = randInt(2, 6);
  const num = randInt(1, den - 1);
  const mult = randInt(2, 4);
  const targetDen = den * mult;
  const targetNum = num * mult;
  
  // Generate wrong answers
  const choices = [[targetNum, targetDen]];
  while (choices.length < 4) {
    const wrongNum = targetNum + randInt(-2, 2);
    if (wrongNum > 0 && wrongNum < targetDen && wrongNum !== targetNum) {
      const exists = choices.some(c => c[0] === wrongNum && c[1] === targetDen);
      if (!exists) choices.push([wrongNum, targetDen]);
    }
  }
  
  // Shuffle
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  
  return {
    type: 'equivalent',
    original: [num, den],
    targetDen,
    choices,
    answer: choices.findIndex(c => c[0] === targetNum && c[1] === targetDen),
    tip: `Multiply top and bottom by ${mult}: (${num}×${mult})/(${den}×${mult}) = ${targetNum}/${targetDen}`,
  };
}

function generateAddSameProblem() {
  const den = randInt(3, 10);
  const num1 = randInt(1, den - 2);
  const num2 = randInt(1, den - num1);
  const sumNum = num1 + num2;
  const [simpNum, simpDen] = simplify(sumNum, den);
  
  // Generate choices
  const choices = [[simpNum, simpDen]];
  while (choices.length < 4) {
    const wrongNum = simpNum + randInt(-2, 2);
    const wrongDen = simpDen + randInt(-1, 1);
    if (wrongNum > 0 && wrongDen > 0 && (wrongNum !== simpNum || wrongDen !== simpDen)) {
      const exists = choices.some(c => c[0] === wrongNum && c[1] === wrongDen);
      if (!exists) choices.push([wrongNum, wrongDen]);
    }
  }
  
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  
  return {
    type: 'add-same',
    frac1: [num1, den],
    frac2: [num2, den],
    choices,
    answer: choices.findIndex(c => c[0] === simpNum && c[1] === simpDen),
    tip: `${num1}/${den} + ${num2}/${den} = ${sumNum}/${den}${sumNum !== simpNum ? ` = ${simpNum}/${simpDen}` : ''}`,
  };
}

function generateAddDiffProblem() {
  // Use friendly denominators that work well together
  const pairs = [[2, 4], [2, 6], [3, 6], [2, 8], [4, 8], [3, 9], [2, 3], [3, 4], [4, 6]];
  const [den1, den2] = pairs[Math.floor(Math.random() * pairs.length)];
  const num1 = randInt(1, den1 - 1);
  const num2 = randInt(1, den2 - 1);
  
  const commonDen = lcm(den1, den2);
  const converted1 = num1 * (commonDen / den1);
  const converted2 = num2 * (commonDen / den2);
  const sumNum = converted1 + converted2;
  const [simpNum, simpDen] = simplify(sumNum, commonDen);
  
  const choices = [[simpNum, simpDen]];
  while (choices.length < 4) {
    const wrongNum = simpNum + randInt(-2, 2);
    const wrongDen = [simpDen, commonDen, den1, den2][Math.floor(Math.random() * 4)];
    if (wrongNum > 0 && wrongDen > 0 && (wrongNum !== simpNum || wrongDen !== simpDen)) {
      const exists = choices.some(c => c[0] === wrongNum && c[1] === wrongDen);
      if (!exists) choices.push([wrongNum, wrongDen]);
    }
  }
  
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  
  return {
    type: 'add-diff',
    frac1: [num1, den1],
    frac2: [num2, den2],
    choices,
    answer: choices.findIndex(c => c[0] === simpNum && c[1] === simpDen),
    tip: `Common denominator is ${commonDen}: ${converted1}/${commonDen} + ${converted2}/${commonDen} = ${sumNum}/${commonDen}`,
  };
}

function renderFraction(num, den) {
  return `<span class="fraction-display"><span class="num">${num}</span><span class="den">${den}</span></span>`;
}

function drawPie(canvas, num, den, color) {
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  
  ctx.clearRect(0, 0, size, size);
  
  // Draw slices
  for (let i = 0; i < den; i++) {
    const startAngle = (i / den) * Math.PI * 2 - Math.PI / 2;
    const endAngle = ((i + 1) / den) * Math.PI * 2 - Math.PI / 2;
    
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = i < num ? color : '#e2e8f0';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  
  // Border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function renderProblem() {
  const topic = topics[state.topic];
  state.problem = topic.generate();
  state.answered = false;
  
  document.getElementById('problemTitle').textContent = topic.title;
  document.getElementById('problemInstructions').textContent = topic.instructions;
  document.getElementById('feedback').classList.add('hidden');
  
  const area = document.getElementById('problemArea');
  const answer = document.getElementById('answerSection');
  
  if (state.problem.type === 'compare') {
    area.innerHTML = `
      <div class="visual-fractions">
        <canvas id="pie1" width="80" height="80"></canvas>
        <canvas id="pie2" width="80" height="80"></canvas>
      </div>
      <div class="equation-row">
        ${renderFraction(state.problem.frac1[0], state.problem.frac1[1])}
        <span class="operator">?</span>
        ${renderFraction(state.problem.frac2[0], state.problem.frac2[1])}
      </div>
    `;
    
    setTimeout(() => {
      drawPie(document.getElementById('pie1'), state.problem.frac1[0], state.problem.frac1[1], '#a48bdb');
      drawPie(document.getElementById('pie2'), state.problem.frac2[0], state.problem.frac2[1], '#3fc1f0');
    }, 10);
    
    answer.innerHTML = `
      <div class="choices">
        <button class="choice-btn" onclick="checkCompare('left')">${renderFraction(state.problem.frac1[0], state.problem.frac1[1])} is greater</button>
        <button class="choice-btn" onclick="checkCompare('right')">${renderFraction(state.problem.frac2[0], state.problem.frac2[1])} is greater</button>
      </div>
    `;
  }
  else if (state.problem.type === 'equivalent') {
    area.innerHTML = `
      <div class="equation-row">
        ${renderFraction(state.problem.original[0], state.problem.original[1])}
        <span class="operator">=</span>
        ${renderFraction('?', state.problem.targetDen)}
      </div>
    `;
    
    answer.innerHTML = `
      <div class="choices">
        ${state.problem.choices.map((c, i) => `
          <button class="choice-btn" onclick="checkChoice(${i})">${renderFraction(c[0], c[1])}</button>
        `).join('')}
      </div>
    `;
  }
  else if (state.problem.type === 'add-same' || state.problem.type === 'add-diff') {
    area.innerHTML = `
      <div class="equation-row">
        ${renderFraction(state.problem.frac1[0], state.problem.frac1[1])}
        <span class="operator">+</span>
        ${renderFraction(state.problem.frac2[0], state.problem.frac2[1])}
        <span class="operator">=</span>
        <span class="operator">?</span>
      </div>
    `;
    
    answer.innerHTML = `
      <div class="choices">
        ${state.problem.choices.map((c, i) => `
          <button class="choice-btn" onclick="checkChoice(${i})">${renderFraction(c[0], c[1])}</button>
        `).join('')}
      </div>
    `;
  }
}

function checkCompare(choice) {
  if (state.answered) return;
  state.answered = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  const correct = choice === state.problem.answer;
  const clickedIdx = choice === 'left' ? 0 : 1;
  
  btns[clickedIdx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    btns[choice === 'left' ? 1 : 0].classList.add('correct');
  }
  
  showFeedback(correct);
}

function checkChoice(idx) {
  if (state.answered) return;
  state.answered = true;
  
  const btns = document.querySelectorAll('.choice-btn');
  const correct = idx === state.problem.answer;
  
  btns[idx].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    btns[state.problem.answer].classList.add('correct');
  }
  
  showFeedback(correct);
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  
  if (correct) {
    state.stars++;
    state.streak++;
    fb.textContent = '✓ Correct! ' + ['Great!', 'Awesome!', 'Nice!', 'Perfect!'][Math.floor(Math.random() * 4)];
    fb.className = 'feedback correct';
  } else {
    state.streak = 0;
    fb.innerHTML = `✗ Not quite.<div class="tip-box"><strong>💡 Tip:</strong> ${state.problem.tip}</div>`;
    fb.className = 'feedback wrong';
  }
  
  fb.classList.remove('hidden');
  updateUI();
  
  setTimeout(() => {
    state.problemNum++;
    if (state.problemNum >= PROBLEMS_PER_TOPIC) {
      showComplete();
    } else {
      renderProblem();
    }
  }, correct ? 1200 : 2500);
}

function updateUI() {
  document.getElementById('stars').textContent = state.stars;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('progressFill').style.width = 
    ((state.problemNum + 1) / PROBLEMS_PER_TOPIC * 100) + '%';
}

function showComplete() {
  document.getElementById('problemCard').classList.add('hidden');
  document.getElementById('completeCard').classList.remove('hidden');
  document.getElementById('completeMsg').textContent = 
    `You earned ${state.stars} stars in ${topics[state.topic].title}!`;
}

function nextTopic() {
  const topicKeys = Object.keys(topics);
  const currentIdx = topicKeys.indexOf(state.topic);
  
  if (currentIdx < topicKeys.length - 1) {
    setTopic(topicKeys[currentIdx + 1]);
  } else {
    // All done - show final message
    document.getElementById('completeCard').querySelector('.complete-screen').innerHTML = `
      <div class="icon">🏆</div>
      <h2>All Topics Complete!</h2>
      <p>You're a fractions master! Total stars: ${state.stars}</p>
      <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    `;
  }
}

function setTopic(topic) {
  state.topic = topic;
  state.problemNum = 0;
  
  document.querySelectorAll('.topic-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.topic === topic);
  });
  
  document.getElementById('problemCard').classList.remove('hidden');
  document.getElementById('completeCard').classList.add('hidden');
  
  renderProblem();
  updateUI();
}

// Tab clicks
document.querySelectorAll('.topic-tab').forEach(tab => {
  tab.addEventListener('click', () => setTopic(tab.dataset.topic));
});

// Start
renderProblem();
updateUI();
</script>
</body>
</html>
