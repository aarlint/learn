<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Rockets 🚀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --coral: #FF6B6B;
  --sky: #4ECDC4;
  --mint: #A8E6CF;
  --lilac: #DDA0DD;
  --peach: #FFDAB9;
  --pink: #FFB6C1;
  --yellow: #FFD93D;
  --blue: #6C9FFF;
  --orange: #FF9F43;
  --green: #2ECC71;
  --gold: #e5a00d;
  --bg: #FEFCF9;
  --card-bg: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --shadow: 0 4px 15px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 20px;
  --radius-sm: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}
h1, h2, h3 { font-family: 'Baloo 2', cursive; }

.score-bar {
  position: sticky; top: 0; z-index: 100;
  background: white;
  border-bottom: 3px solid var(--gold);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.score-bar h1 { font-size: 1.6rem; color: var(--gold); }
.score-pills { display: flex; gap: 10px; flex-wrap: wrap; }
.pill {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #f8f9fa, #e9ecef);
  border-radius: 50px; padding: 6px 16px;
  font-weight: 700; font-size: 1rem;
  border: 2px solid #e9ecef;
}
.pill .emoji { font-size: 1.2rem; }
.pill.stars { border-color: var(--yellow); background: linear-gradient(135deg, #fff9e6, #fff3cd); }
.pill.streak { border-color: var(--coral); background: linear-gradient(135deg, #ffe8e8, #ffd4d4); }
.pill.level { border-color: var(--sky); background: linear-gradient(135deg, #e8fffe, #d4f8f6); }

.nav-tabs {
  display: flex; gap: 8px; padding: 16px 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav-tab {
  flex-shrink: 0;
  padding: 12px 24px;
  border-radius: 50px;
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-tab:hover { border-color: var(--gold); transform: translateY(-2px); }
.nav-tab.active {
  background: var(--gold);
  color: white;
  border-color: var(--gold);
  box-shadow: 0 4px 15px rgba(229,160,13,0.4);
}

.section { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.section.active { display: block; }
.section-header { text-align: center; margin-bottom: 24px; }
.section-header h2 { font-size: 2rem; margin-bottom: 8px; }
.section-header p { font-size: 1.2rem; color: var(--text-light); }

.progress-track {
  width: 100%; height: 20px;
  background: #e9ecef; border-radius: 50px;
  margin-bottom: 24px; overflow: hidden;
  border: 2px solid #dee2e6;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--yellow));
  border-radius: 50px; transition: width 0.5s ease;
}
.progress-text {
  text-align: center; font-weight: 700; margin-bottom: 8px;
  font-size: 1.1rem; color: var(--text-light);
}

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
  border-left: 6px solid var(--gold);
}
.card.coral { border-left-color: var(--coral); }
.card.blue { border-left-color: var(--blue); }
.card.green { border-left-color: var(--green); }
.card.pink { border-left-color: var(--pink); }

.quiz-question {
  font-family: 'Baloo 2', cursive;
  font-size: 1.8rem;
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.3;
}
.quiz-visual {
  text-align: center;
  font-size: 3rem;
  margin-bottom: 20px;
  line-height: 1.5;
}
.sight-word {
  display: inline-block;
  padding: 16px 40px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  color: white;
  border-radius: 20px;
  font-family: 'Baloo 2', cursive;
  font-size: 3.5rem;
  font-weight: 800;
  box-shadow: 0 6px 20px rgba(229,160,13,0.3);
  letter-spacing: 4px;
}
.sentence-display {
  display: inline-block;
  padding: 20px 32px;
  background: #f8f9fa;
  border: 3px dashed var(--gold);
  border-radius: 16px;
  font-family: 'Baloo 2', cursive;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.option-btn {
  padding: 20px;
  border-radius: var(--radius-sm);
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.option-btn:hover {
  border-color: var(--gold);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}
.option-btn.correct {
  background: #d4edda; border-color: var(--green);
  animation: popIn 0.4s ease;
}
.option-btn.wrong {
  background: #f8d7da; border-color: var(--coral);
  animation: shake 0.5s ease;
}
.option-btn:disabled { cursor: default; opacity: 0.7; }

.feedback {
  padding: 20px; border-radius: var(--radius-sm);
  text-align: center; font-size: 1.3rem;
  font-weight: 700; margin-bottom: 16px; display: none;
}
.feedback.correct {
  background: #d4edda; color: #155724;
  border: 2px solid #c3e6cb; display: block;
}
.feedback.wrong {
  background: #fff3cd; color: #856404;
  border: 2px solid #ffc107; display: block;
}

.next-btn {
  display: block; margin: 20px auto;
  padding: 16px 48px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  color: white; font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(229,160,13,0.4);
}
.next-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

.completion { text-align: center; padding: 40px 20px; }
.completion h2 { font-size: 2.4rem; margin-bottom: 12px; }
.completion .big-emoji { font-size: 5rem; margin-bottom: 16px; }
.completion p { font-size: 1.3rem; color: var(--text-light); margin-bottom: 24px; }
.play-again-btn {
  padding: 16px 48px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--coral), var(--orange));
  color: white; font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(255,107,107,0.4);
}
.play-again-btn:hover { transform: translateY(-3px); }

@keyframes popIn {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-10px); }
  80% { transform: translateX(10px); }
}

@media (max-width: 600px) {
  .score-bar { flex-direction: column; gap: 8px; }
  .quiz-question { font-size: 1.4rem; }
  .quiz-visual { font-size: 2.2rem; }
  .sight-word { font-size: 2.5rem; padding: 12px 24px; }
  .sentence-display { font-size: 1.4rem; padding: 16px 20px; }
  .option-btn { font-size: 1.2rem; padding: 16px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>

<div class="score-bar">
  <h1>🚀 Reading Rockets</h1>
  <div class="score-pills">
    <div class="pill stars"><span class="emoji">⭐</span> <span id="stars">0</span></div>
    <div class="pill streak"><span class="emoji">🔥</span> <span id="streak">0</span></div>
    <div class="pill level"><span class="emoji">🏆</span> Lv <span id="level">1</span></div>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showSection(0)">👀 Sight Words</button>
  <button class="nav-tab" onclick="showSection(1)">🎵 Rhyming Match</button>
  <button class="nav-tab" onclick="showSection(2)">📖 Read It!</button>
  <button class="nav-tab" onclick="showSection(3)">👨‍👩‍👧 Word Families</button>
</div>

<div id="section-0" class="section active"></div>
<div id="section-1" class="section"></div>
<div id="section-2" class="section"></div>
<div id="section-3" class="section"></div>

<script>
const state = {
  stars: 0, streak: 0, level: 1, totalCorrect: 0,
  sections: [{},{},{},{}]
};

const sectionData = [
  {
    title: "Sight Words! 👀",
    subtitle: "Can you read these important words?",
    accent: "",
    questions: [
      { visual: '<span class="sight-word">the</span>', q: "What word is this?", options: ["the","he","she","they"], answer: 0 },
      { visual: '<span class="sight-word">is</span>', q: "What word is this?", options: ["it","as","is","in"], answer: 2 },
      { visual: '<span class="sight-word">can</span>', q: "What word is this?", options: ["cat","car","cap","can"], answer: 3 },
      { visual: '<span class="sight-word">see</span>', q: "What word is this?", options: ["she","see","sea","set"], answer: 1 },
      { visual: '<span class="sight-word">my</span>', q: "What word is this?", options: ["me","may","my","by"], answer: 2 },
      { visual: '<span class="sight-word">like</span>', q: "What word is this?", options: ["lick","lake","look","like"], answer: 3 },
      { visual: '<span class="sight-word">go</span>', q: "What word is this?", options: ["do","no","go","so"], answer: 2 },
    ]
  },
  {
    title: "Rhyming Match! 🎵",
    subtitle: "Find the word that sounds the same at the end!",
    accent: "coral",
    questions: [
      { visual: "🐱 CAT", q: "Which word rhymes with CAT?", options: ["🎩 Hat","🐶 Dog","🌞 Sun","🐟 Fish"], answer: 0 },
      { visual: "🐶 DOG", q: "Which word rhymes with DOG?", options: ["🐱 Cat","🪵 Log","🐷 Pig","🐻 Bear"], answer: 1 },
      { visual: "🔔 BELL", q: "Which word rhymes with BELL?", options: ["⚽ Ball","🐚 Shell","🐦 Bird","🌙 Moon"], answer: 1 },
      { visual: "🎂 CAKE", q: "Which word rhymes with CAKE?", options: ["🐱 Cat","🌊 Lake","🐟 Fish","🐶 Dog"], answer: 1 },
      { visual: "🌙 MOON", q: "Which word rhymes with MOON?", options: ["🥄 Spoon","⭐ Star","🌞 Sun","🐱 Cat"], answer: 0 },
      { visual: "🐻 BIG", q: "Which word rhymes with BIG?", options: ["🐶 Dog","🐱 Cat","🐷 Pig","🐟 Fish"], answer: 2 },
    ]
  },
  {
    title: "Read the Sentence! 📖",
    subtitle: "Read the sentence and answer the question!",
    accent: "green",
    questions: [
      { visual: '<span class="sentence-display">I can see the cat.</span>', q: "What can I see?", options: ["🐶 A dog","🐱 A cat","🐟 A fish","🐻 A bear"], answer: 1 },
      { visual: '<span class="sentence-display">The dog is big.</span>', q: "What is big?", options: ["🐱 The cat","🐟 The fish","🐶 The dog","🌞 The sun"], answer: 2 },
      { visual: '<span class="sentence-display">I like my hat.</span>', q: "What do I like?", options: ["🐱 My cat","🎩 My hat","🐶 My dog","🌞 The sun"], answer: 1 },
      { visual: '<span class="sentence-display">We can go!</span>', q: "What can we do?", options: ["🏃 Go","😴 Sleep","🍎 Eat","📖 Read"], answer: 0 },
      { visual: '<span class="sentence-display">I see a red bug.</span>', q: "What color is the bug?", options: ["🔵 Blue","🟢 Green","🔴 Red","🟡 Yellow"], answer: 2 },
      { visual: '<span class="sentence-display">The sun is up!</span>', q: "What is up?", options: ["🌙 The moon","🌞 The sun","⭐ A star","🎈 A balloon"], answer: 1 },
    ]
  },
  {
    title: "Word Families! 👨‍👩‍👧",
    subtitle: "These words all end the same way!",
    accent: "blue",
    questions: [
      { visual: "The -AT family:<br>cat, bat, hat, ...", q: "Which word is in the -AT family?", options: ["🐶 Dog","🐀 Rat","🌞 Sun","🐟 Fin"], answer: 1 },
      { visual: "The -OG family:<br>dog, log, fog, ...", q: "Which word is in the -OG family?", options: ["🐸 Frog","🐱 Cat","🎩 Hat","🐻 Bear"], answer: 0 },
      { visual: "The -AN family:<br>can, fan, man, ...", q: "Which word is in the -AN family?", options: ["🐶 Dog","🐱 Cat","🚐 Van","🌞 Sun"], answer: 2 },
      { visual: "The -OP family:<br>hop, mop, top, ...", q: "Which word is in the -OP family?", options: ["🐱 Cat","🛑 Stop","🌞 Sun","🐶 Dog"], answer: 1 },
      { visual: "The -UG family:<br>bug, hug, mug, ...", q: "Which word is in the -UG family?", options: ["🐶 Dog","🐱 Cat","🔌 Plug","🌞 Sun"], answer: 2 },
      { visual: "The -IN family:<br>pin, fin, win, ...", q: "Which word is in the -IN family?", options: ["🗑️ Bin","🐶 Dog","🐱 Cat","🌞 Sun"], answer: 0 },
    ]
  }
];

const encourageCorrect = ["🎉 FANTASTIC!", "⭐ GREAT READING!", "🥳 YOU DID IT!", "💪 SO SMART!", "🌟 AMAZING!", "🏆 READING STAR!", "🚀 BLAST OFF!"];
const encourageWrong = ["Almost! Keep reading! 💪", "That's okay! Try again next time! 🌟", "Good try! 📚", "No worries! 😊"];

function updateScore() {
  document.getElementById('stars').textContent = state.stars;
  document.getElementById('streak').textContent = state.streak;
  state.level = Math.floor(state.totalCorrect / 5) + 1;
  document.getElementById('level').textContent = state.level;
}

function showSection(idx) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===idx));
  if (!state.sections[idx].initialized) initSection(idx);
}

function initSection(idx) {
  const sec = state.sections[idx];
  sec.initialized = true;
  sec.current = 0;
  sec.correct = 0;
  sec.questions = [...sectionData[idx].questions].sort(() => Math.random()-0.5);
  renderQuestion(idx);
}

function renderQuestion(idx) {
  const sec = state.sections[idx];
  const data = sectionData[idx];
  const container = document.getElementById('section-'+idx);

  if (sec.current >= sec.questions.length) {
    container.innerHTML = `
      <div class="completion">
        <div class="big-emoji">🚀</div>
        <h2>Section Complete!</h2>
        <p>You got ${sec.correct} out of ${sec.questions.length} right!</p>
        <p>${sec.correct === sec.questions.length ? "🌟 PERFECT! You're a Reading Rocket! 🌟" : "Awesome job! Keep reading! 📚"}</p>
        <button class="play-again-btn" onclick="resetSection(${idx})">🔄 Play Again!</button>
      </div>`;
    return;
  }

  const q = sec.questions[sec.current];
  const total = sec.questions.length;
  const pct = Math.round((sec.current/total)*100);

  container.innerHTML = `
    <div class="section-header">
      <h2>${data.title}</h2>
      <p>${data.subtitle}</p>
    </div>
    <div class="progress-text">Question ${sec.current+1} of ${total}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card ${data.accent}">
      <div class="quiz-visual">${q.visual}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="options-grid">
        ${q.options.map((o,i) => `<button class="option-btn" onclick="answer(${idx},${i})">${o}</button>`).join('')}
      </div>
      <div id="feedback-${idx}" class="feedback"></div>
    </div>
    <button class="next-btn" id="next-${idx}" style="display:none" onclick="nextQ(${idx})">Next ➡️</button>`;
}

function answer(idx, chosen) {
  const sec = state.sections[idx];
  const q = sec.questions[sec.current];
  const btns = document.querySelectorAll(`#section-${idx} .option-btn`);
  const fb = document.getElementById('feedback-'+idx);
  const nextBtn = document.getElementById('next-'+idx);

  btns.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    btns[chosen].classList.add('correct');
    sec.correct++; state.stars++; state.streak++; state.totalCorrect++;
    fb.className = 'feedback correct';
    fb.textContent = encourageCorrect[Math.floor(Math.random()*encourageCorrect.length)];
  } else {
    btns[chosen].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    state.streak = 0;
    fb.className = 'feedback wrong';
    fb.textContent = encourageWrong[Math.floor(Math.random()*encourageWrong.length)] + ` The answer is "${q.options[q.answer]}"!`;
  }
  updateScore();
  nextBtn.style.display = 'block';
}

function nextQ(idx) { state.sections[idx].current++; renderQuestion(idx); }
function resetSection(idx) { state.sections[idx].initialized = false; initSection(idx); }

initSection(0);
</script>
</body>
</html>
