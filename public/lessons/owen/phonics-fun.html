<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phonics Fun 🔤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --coral: #FF6B6B;
  --sky: #4ECDC4;
  --mint: #A8E6CF;
  --lilac: #DDA0DD;
  --peach: #FFDAB9;
  --pink: #FFB6C1;
  --yellow: #FFD93D;
  --blue: #6C9FFF;
  --orange: #FF9F43;
  --green: #2ECC71;
  --purple: #a48bdb;
  --bg: #FEFCF9;
  --card-bg: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --shadow: 0 4px 15px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 20px;
  --radius-sm: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}
h1, h2, h3 { font-family: 'Baloo 2', cursive; }

.score-bar {
  position: sticky; top: 0; z-index: 100;
  background: white;
  border-bottom: 3px solid var(--purple);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.score-bar h1 { font-size: 1.6rem; color: var(--purple); }
.score-pills { display: flex; gap: 10px; flex-wrap: wrap; }
.pill {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #f8f9fa, #e9ecef);
  border-radius: 50px; padding: 6px 16px;
  font-weight: 700; font-size: 1rem;
  border: 2px solid #e9ecef;
}
.pill .emoji { font-size: 1.2rem; }
.pill.stars { border-color: var(--yellow); background: linear-gradient(135deg, #fff9e6, #fff3cd); }
.pill.streak { border-color: var(--coral); background: linear-gradient(135deg, #ffe8e8, #ffd4d4); }
.pill.level { border-color: var(--sky); background: linear-gradient(135deg, #e8fffe, #d4f8f6); }

.nav-tabs {
  display: flex; gap: 8px; padding: 16px 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav-tab {
  flex-shrink: 0;
  padding: 12px 24px;
  border-radius: 50px;
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-tab:hover { border-color: var(--purple); transform: translateY(-2px); }
.nav-tab.active {
  background: var(--purple);
  color: white;
  border-color: var(--purple);
  box-shadow: 0 4px 15px rgba(164,139,219,0.4);
}

.section { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.section.active { display: block; }
.section-header { text-align: center; margin-bottom: 24px; }
.section-header h2 { font-size: 2rem; margin-bottom: 8px; }
.section-header p { font-size: 1.2rem; color: var(--text-light); }

.progress-track {
  width: 100%; height: 20px;
  background: #e9ecef; border-radius: 50px;
  margin-bottom: 24px; overflow: hidden;
  border: 2px solid #dee2e6;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--lilac));
  border-radius: 50px; transition: width 0.5s ease;
}
.progress-text {
  text-align: center; font-weight: 700; margin-bottom: 8px;
  font-size: 1.1rem; color: var(--text-light);
}

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
  border-left: 6px solid var(--purple);
}
.card.coral { border-left-color: var(--coral); }
.card.mint { border-left-color: var(--mint); }
.card.yellow { border-left-color: var(--yellow); }
.card.blue { border-left-color: var(--blue); }
.card.pink { border-left-color: var(--pink); }

.quiz-question {
  font-family: 'Baloo 2', cursive;
  font-size: 1.8rem;
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.3;
}
.quiz-visual {
  text-align: center;
  font-size: 3.5rem;
  margin-bottom: 20px;
  line-height: 1.5;
}
.quiz-visual .big-letter {
  display: inline-block;
  width: 100px; height: 100px;
  line-height: 100px;
  background: linear-gradient(135deg, var(--purple), var(--lilac));
  color: white;
  border-radius: 20px;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  margin: 0 8px;
  box-shadow: 0 4px 15px rgba(164,139,219,0.3);
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.option-btn {
  padding: 20px;
  border-radius: var(--radius-sm);
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.5rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.option-btn:hover {
  border-color: var(--purple);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}
.option-btn.correct {
  background: #d4edda; border-color: var(--green);
  animation: popIn 0.4s ease;
}
.option-btn.wrong {
  background: #f8d7da; border-color: var(--coral);
  animation: shake 0.5s ease;
}
.option-btn:disabled { cursor: default; opacity: 0.7; }

.feedback {
  padding: 20px; border-radius: var(--radius-sm);
  text-align: center; font-size: 1.3rem;
  font-weight: 700; margin-bottom: 16px; display: none;
}
.feedback.correct {
  background: #d4edda; color: #155724;
  border: 2px solid #c3e6cb; display: block;
}
.feedback.wrong {
  background: #fff3cd; color: #856404;
  border: 2px solid #ffc107; display: block;
}

.next-btn {
  display: block; margin: 20px auto;
  padding: 16px 48px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--purple), var(--lilac));
  color: white; font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(164,139,219,0.4);
}
.next-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

.completion { text-align: center; padding: 40px 20px; }
.completion h2 { font-size: 2.4rem; margin-bottom: 12px; }
.completion .big-emoji { font-size: 5rem; margin-bottom: 16px; }
.completion p { font-size: 1.3rem; color: var(--text-light); margin-bottom: 24px; }
.play-again-btn {
  padding: 16px 48px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--coral), var(--orange));
  color: white; font-family: 'Baloo 2', cursive;
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(255,107,107,0.4);
}
.play-again-btn:hover { transform: translateY(-3px); }

@keyframes popIn {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-10px); }
  80% { transform: translateX(10px); }
}

@media (max-width: 600px) {
  .score-bar { flex-direction: column; gap: 8px; }
  .quiz-question { font-size: 1.4rem; }
  .quiz-visual { font-size: 2.5rem; }
  .quiz-visual .big-letter { width: 70px; height: 70px; line-height: 70px; font-size: 2.5rem; }
  .option-btn { font-size: 1.2rem; padding: 16px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>

<div class="score-bar">
  <h1>🔤 Phonics Fun</h1>
  <div class="score-pills">
    <div class="pill stars"><span class="emoji">⭐</span> <span id="stars">0</span></div>
    <div class="pill streak"><span class="emoji">🔥</span> <span id="streak">0</span></div>
    <div class="pill level"><span class="emoji">🏆</span> Lv <span id="level">1</span></div>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showSection(0)">🔊 Letter Sounds</button>
  <button class="nav-tab" onclick="showSection(1)">🎯 Beginning Sounds</button>
  <button class="nav-tab" onclick="showSection(2)">🎵 Rhyming Words</button>
  <button class="nav-tab" onclick="showSection(3)">📖 CVC Words</button>
</div>

<div id="section-0" class="section active"></div>
<div id="section-1" class="section"></div>
<div id="section-2" class="section"></div>
<div id="section-3" class="section"></div>

<script>
const state = {
  stars: 0, streak: 0, level: 1, totalCorrect: 0,
  sections: [{},{},{},{}]
};

const sectionData = [
  {
    title: "Letter Sounds! 🔊",
    subtitle: "What sound does this letter make?",
    accent: "",
    questions: [
      { visual: '<span class="big-letter">B</span> 🐻', q: "What sound does B make?", options: ["/b/ like Bear", "/d/ like Dog", "/p/ like Pig", "/m/ like Moon"], answer: 0 },
      { visual: '<span class="big-letter">S</span> 🐍', q: "What sound does S make?", options: ["/z/ like Zebra", "/sh/ like Ship", "/s/ like Snake", "/c/ like Cat"], answer: 2 },
      { visual: '<span class="big-letter">M</span> 🌙', q: "What sound does M make?", options: ["/n/ like Nest", "/m/ like Moon", "/w/ like Wind", "/b/ like Ball"], answer: 1 },
      { visual: '<span class="big-letter">T</span> 🐢', q: "What sound does T make?", options: ["/d/ like Dog", "/p/ like Pan", "/t/ like Turtle", "/k/ like Kite"], answer: 2 },
      { visual: '<span class="big-letter">A</span> 🍎', q: "What sound does short A make?", options: ["/a/ like Apple", "/e/ like Egg", "/o/ like Octopus", "/i/ like Igloo"], answer: 0 },
      { visual: '<span class="big-letter">D</span> 🦆', q: "What sound does D make?", options: ["/b/ like Bear", "/t/ like Top", "/d/ like Duck", "/g/ like Goat"], answer: 2 },
      { visual: '<span class="big-letter">F</span> 🐸', q: "What sound does F make?", options: ["/v/ like Vine", "/f/ like Frog", "/p/ like Pig", "/th/ like That"], answer: 1 },
    ]
  },
  {
    title: "Beginning Sounds! 🎯",
    subtitle: "What letter does this word start with?",
    accent: "coral",
    questions: [
      { visual: "🐱 Cat", q: "CAT starts with which letter?", options: ["K","S","C","T"], answer: 2 },
      { visual: "🐶 Dog", q: "DOG starts with which letter?", options: ["B","D","G","P"], answer: 1 },
      { visual: "🐟 Fish", q: "FISH starts with which letter?", options: ["P","S","V","F"], answer: 3 },
      { visual: "🌞 Sun", q: "SUN starts with which letter?", options: ["S","Z","C","X"], answer: 0 },
      { visual: "🎩 Hat", q: "HAT starts with which letter?", options: ["A","T","N","H"], answer: 3 },
      { visual: "🐷 Pig", q: "PIG starts with which letter?", options: ["B","D","P","G"], answer: 2 },
      { visual: "🌙 Moon", q: "MOON starts with which letter?", options: ["N","W","M","O"], answer: 2 },
    ]
  },
  {
    title: "Rhyming Words! 🎵",
    subtitle: "Which word sounds like the other?",
    accent: "blue",
    questions: [
      { visual: "🐱 CAT", q: "Which word rhymes with CAT?", options: ["🦇 Bat","🐶 Dog","🌞 Sun","🐷 Pig"], answer: 0 },
      { visual: "🐶 DOG", q: "Which word rhymes with DOG?", options: ["🐱 Cat","🐸 Frog","🐟 Fish","🐻 Bear"], answer: 1 },
      { visual: "⭐ STAR", q: "Which word rhymes with STAR?", options: ["🌞 Sun","🚗 Car","🎩 Hat","🐟 Fin"], answer: 1 },
      { visual: "🎩 HAT", q: "Which word rhymes with HAT?", options: ["🐶 Dog","🌙 Moon","🐱 Sat","🐟 Fish"], answer: 2 },
      { visual: "🐻 BEE", q: "Which word rhymes with BEE?", options: ["🌊 Sea","🐶 Dog","🌞 Sun","🐱 Cat"], answer: 0 },
      { visual: "🎂 CAKE", q: "Which word rhymes with CAKE?", options: ["🐱 Cat","🌙 Make","🐟 Fish","🐶 Dog"], answer: 1 },
    ]
  },
  {
    title: "CVC Words! 📖",
    subtitle: "Sound it out! What word do these letters make?",
    accent: "pink",
    questions: [
      { visual: '<span class="big-letter">C</span><span class="big-letter">A</span><span class="big-letter">T</span>', q: "Sound it out: C-A-T", options: ["🐱 Cat","🚗 Car","🎂 Cake","🐮 Cow"], answer: 0 },
      { visual: '<span class="big-letter">D</span><span class="big-letter">O</span><span class="big-letter">G</span>', q: "Sound it out: D-O-G", options: ["🦆 Duck","🚪 Door","🐶 Dog","📱 Dig"], answer: 2 },
      { visual: '<span class="big-letter">S</span><span class="big-letter">U</span><span class="big-letter">N</span>', q: "Sound it out: S-U-N", options: ["🐍 Snake","🎤 Sing","🌞 Sun","🧦 Sock"], answer: 2 },
      { visual: '<span class="big-letter">H</span><span class="big-letter">A</span><span class="big-letter">T</span>', q: "Sound it out: H-A-T", options: ["🏠 House","🎩 Hat","🐴 Horse","🔨 Hammer"], answer: 1 },
      { visual: '<span class="big-letter">B</span><span class="big-letter">U</span><span class="big-letter">G</span>', q: "Sound it out: B-U-G", options: ["🐦 Bird","👜 Bag","🐛 Bug","🚌 Bus"], answer: 2 },
      { visual: '<span class="big-letter">P</span><span class="big-letter">I</span><span class="big-letter">G</span>', q: "Sound it out: P-I-G", options: ["🐷 Pig","📌 Pin","🥧 Pie","🍐 Pear"], answer: 0 },
    ]
  }
];

const encourageCorrect = ["🎉 FANTASTIC!", "⭐ YOU DID IT!", "🥳 WOOHOO!", "💪 SO SMART!", "🌟 AMAZING!", "🏆 PHONICS PRO!", "😊 AWESOME!"];
const encourageWrong = ["Almost! Keep going! 💪", "That's okay! You're learning! 🌟", "Good try! 📚", "No worries! 😊"];

function updateScore() {
  document.getElementById('stars').textContent = state.stars;
  document.getElementById('streak').textContent = state.streak;
  state.level = Math.floor(state.totalCorrect / 5) + 1;
  document.getElementById('level').textContent = state.level;
}

function showSection(idx) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===idx));
  if (!state.sections[idx].initialized) initSection(idx);
}

function initSection(idx) {
  const sec = state.sections[idx];
  sec.initialized = true;
  sec.current = 0;
  sec.correct = 0;
  sec.questions = [...sectionData[idx].questions].sort(() => Math.random()-0.5);
  renderQuestion(idx);
}

function renderQuestion(idx) {
  const sec = state.sections[idx];
  const data = sectionData[idx];
  const container = document.getElementById('section-'+idx);

  if (sec.current >= sec.questions.length) {
    container.innerHTML = `
      <div class="completion">
        <div class="big-emoji">📖</div>
        <h2>Section Complete!</h2>
        <p>You got ${sec.correct} out of ${sec.questions.length} right!</p>
        <p>${sec.correct === sec.questions.length ? "🌟 PERFECT! You're a Phonics Superstar! 🌟" : "Great job! Keep reading! 💪"}</p>
        <button class="play-again-btn" onclick="resetSection(${idx})">🔄 Play Again!</button>
      </div>`;
    return;
  }

  const q = sec.questions[sec.current];
  const total = sec.questions.length;
  const pct = Math.round((sec.current/total)*100);

  container.innerHTML = `
    <div class="section-header">
      <h2>${data.title}</h2>
      <p>${data.subtitle}</p>
    </div>
    <div class="progress-text">Question ${sec.current+1} of ${total}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card ${data.accent}">
      <div class="quiz-visual">${q.visual}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="options-grid">
        ${q.options.map((o,i) => `<button class="option-btn" onclick="answer(${idx},${i})">${o}</button>`).join('')}
      </div>
      <div id="feedback-${idx}" class="feedback"></div>
    </div>
    <button class="next-btn" id="next-${idx}" style="display:none" onclick="nextQ(${idx})">Next ➡️</button>`;
}

function answer(idx, chosen) {
  const sec = state.sections[idx];
  const q = sec.questions[sec.current];
  const btns = document.querySelectorAll(`#section-${idx} .option-btn`);
  const fb = document.getElementById('feedback-'+idx);
  const nextBtn = document.getElementById('next-'+idx);

  btns.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    btns[chosen].classList.add('correct');
    sec.correct++; state.stars++; state.streak++; state.totalCorrect++;
    fb.className = 'feedback correct';
    fb.textContent = encourageCorrect[Math.floor(Math.random()*encourageCorrect.length)];
  } else {
    btns[chosen].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    state.streak = 0;
    fb.className = 'feedback wrong';
    fb.textContent = encourageWrong[Math.floor(Math.random()*encourageWrong.length)] + ` The answer is "${q.options[q.answer]}"!`;
  }
  updateScore();
  nextBtn.style.display = 'block';
}

function nextQ(idx) { state.sections[idx].current++; renderQuestion(idx); }
function resetSection(idx) { state.sections[idx].initialized = false; initSection(idx); }

initSection(0);
</script>
</body>
</html>
