<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Heroes 🔢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --coral: #FF6B6B;
  --sky: #4ECDC4;
  --mint: #A8E6CF;
  --lilac: #DDA0DD;
  --peach: #FFDAB9;
  --pink: #FFB6C1;
  --yellow: #FFD93D;
  --blue: #6C9FFF;
  --orange: #FF9F43;
  --green: #2ECC71;
  --bg: #FEFCF9;
  --card-bg: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --shadow: 0 4px 15px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 20px;
  --radius-sm: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

h1, h2, h3 { font-family: 'Baloo 2', cursive; }

/* Score Bar */
.score-bar {
  position: sticky; top: 0; z-index: 100;
  background: white;
  border-bottom: 3px solid var(--yellow);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
}
.score-bar h1 { font-size: 1.6rem; color: var(--blue); }
.score-pills { display: flex; gap: 10px; flex-wrap: wrap; }
.pill {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #f8f9fa, #e9ecef);
  border-radius: 50px; padding: 6px 16px;
  font-weight: 700; font-size: 1rem;
  border: 2px solid #e9ecef;
}
.pill .emoji { font-size: 1.2rem; }
.pill.stars { border-color: var(--yellow); background: linear-gradient(135deg, #fff9e6, #fff3cd); }
.pill.streak { border-color: var(--coral); background: linear-gradient(135deg, #ffe8e8, #ffd4d4); }
.pill.level { border-color: var(--sky); background: linear-gradient(135deg, #e8fffe, #d4f8f6); }

/* Nav Tabs */
.nav-tabs {
  display: flex; gap: 8px; padding: 16px 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav-tab {
  flex-shrink: 0;
  padding: 12px 24px;
  border-radius: 50px;
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.15rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  white-space: nowrap;
}
.nav-tab:hover { border-color: var(--blue); transform: translateY(-2px); }
.nav-tab.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
  box-shadow: 0 4px 15px rgba(108,159,255,0.4);
}

/* Section */
.section { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
.section.active { display: block; }
.section-header {
  text-align: center; margin-bottom: 24px;
}
.section-header h2 { font-size: 2rem; margin-bottom: 8px; }
.section-header p { font-size: 1.2rem; color: var(--text-light); }

/* Progress */
.progress-track {
  width: 100%; height: 20px;
  background: #e9ecef;
  border-radius: 50px;
  margin-bottom: 24px;
  overflow: hidden;
  border: 2px solid #dee2e6;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--blue));
  border-radius: 50px;
  transition: width 0.5s ease;
  position: relative;
}
.progress-text {
  text-align: center; font-weight: 700; margin-bottom: 8px;
  font-size: 1.1rem; color: var(--text-light);
}

/* Card */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
  border-left: 6px solid var(--blue);
  position: relative;
}
.card.coral { border-left-color: var(--coral); }
.card.mint { border-left-color: var(--mint); }
.card.yellow { border-left-color: var(--yellow); }
.card.lilac { border-left-color: var(--lilac); }

/* Quiz */
.quiz-question {
  font-family: 'Baloo 2', cursive;
  font-size: 1.8rem;
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.3;
}
.quiz-visual {
  text-align: center;
  font-size: 3rem;
  margin-bottom: 20px;
  line-height: 1.5;
  letter-spacing: 8px;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.option-btn {
  padding: 20px;
  border-radius: var(--radius-sm);
  border: 3px solid #e9ecef;
  background: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.6rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.option-btn:hover {
  border-color: var(--blue);
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}
.option-btn.correct {
  background: #d4edda;
  border-color: var(--green);
  animation: popIn 0.4s ease;
}
.option-btn.wrong {
  background: #f8d7da;
  border-color: var(--coral);
  animation: shake 0.5s ease;
}
.option-btn:disabled { cursor: default; opacity: 0.7; }

/* Feedback */
.feedback {
  padding: 20px;
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: none;
}
.feedback.correct {
  background: #d4edda;
  color: #155724;
  border: 2px solid #c3e6cb;
  display: block;
}
.feedback.wrong {
  background: #fff3cd;
  color: #856404;
  border: 2px solid #ffc107;
  display: block;
}

/* Next Button */
.next-btn {
  display: block;
  margin: 20px auto;
  padding: 16px 48px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, var(--blue), var(--sky));
  color: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(108,159,255,0.4);
}
.next-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

/* Completion */
.completion {
  text-align: center; padding: 40px 20px;
}
.completion h2 { font-size: 2.4rem; margin-bottom: 12px; }
.completion .big-emoji { font-size: 5rem; margin-bottom: 16px; }
.completion p { font-size: 1.3rem; color: var(--text-light); margin-bottom: 24px; }
.play-again-btn {
  padding: 16px 48px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, var(--coral), var(--orange));
  color: white;
  font-family: 'Baloo 2', cursive;
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(255,107,107,0.4);
}
.play-again-btn:hover { transform: translateY(-3px); }

@keyframes popIn {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-10px); }
  80% { transform: translateX(10px); }
}
@keyframes celebrate {
  0% { transform: scale(1); }
  50% { transform: scale(1.2) rotate(5deg); }
  100% { transform: scale(1); }
}

@media (max-width: 600px) {
  .score-bar { flex-direction: column; gap: 8px; }
  .quiz-question { font-size: 1.4rem; }
  .quiz-visual { font-size: 2.2rem; }
  .option-btn { font-size: 1.3rem; padding: 16px; }
  .options-grid { gap: 10px; }
  .card { padding: 20px; }
}
</style>
</head>
<body>

<div class="score-bar">
  <h1>🔢 Number Heroes</h1>
  <div class="score-pills">
    <div class="pill stars"><span class="emoji">⭐</span> <span id="stars">0</span></div>
    <div class="pill streak"><span class="emoji">🔥</span> <span id="streak">0</span></div>
    <div class="pill level"><span class="emoji">🏆</span> Lv <span id="level">1</span></div>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showSection(0)">🍎 Count Objects</button>
  <button class="nav-tab" onclick="showSection(1)">🔢 Number Names</button>
  <button class="nav-tab" onclick="showSection(2)">⚖️ Compare</button>
  <button class="nav-tab" onclick="showSection(3)">❓ Missing Numbers</button>
</div>

<div id="section-0" class="section active"></div>
<div id="section-1" class="section"></div>
<div id="section-2" class="section"></div>
<div id="section-3" class="section"></div>

<script>
const state = {
  stars: 0, streak: 0, level: 1, totalCorrect: 0,
  sections: [{},{},{},{}]
};

const sectionData = [
  {
    title: "Count the Objects! 🍎",
    subtitle: "How many do you see? Count them up!",
    accent: "blue",
    questions: [
      { visual: "🍎🍎🍎", q: "How many apples?", options: ["2","3","4","5"], answer: 1 },
      { visual: "⭐⭐⭐⭐⭐", q: "How many stars?", options: ["4","6","5","3"], answer: 2 },
      { visual: "🐶🐶", q: "How many puppies?", options: ["1","3","2","4"], answer: 2 },
      { visual: "🌈🌈🌈🌈🌈🌈", q: "How many rainbows?", options: ["5","7","6","4"], answer: 2 },
      { visual: "🎈🎈🎈🎈", q: "How many balloons?", options: ["3","5","2","4"], answer: 3 },
      { visual: "🐱🐱🐱🐱🐱🐱🐱", q: "How many kittens?", options: ["6","8","7","5"], answer: 2 },
      { visual: "🍌🍌🍌🍌🍌🍌🍌🍌🍌🍌", q: "How many bananas?", options: ["9","8","10","11"], answer: 2 },
    ]
  },
  {
    title: "Number Names! 🔢",
    subtitle: "Can you pick the right number?",
    accent: "coral",
    questions: [
      { visual: "✋✋✋", q: "Which number is FIFTEEN?", options: ["12","15","13","50"], answer: 1 },
      { visual: "🔢", q: "Which one says SEVEN?", options: ["5","9","7","11"], answer: 2 },
      { visual: "🎯", q: "Which one says TWELVE?", options: ["20","12","2","21"], answer: 1 },
      { visual: "💡", q: "Which one says NINETEEN?", options: ["9","18","16","19"], answer: 3 },
      { visual: "🌟", q: "Which one says ELEVEN?", options: ["11","1","10","7"], answer: 0 },
      { visual: "🎨", q: "Which one says TWENTY?", options: ["12","2","20","10"], answer: 2 },
    ]
  },
  {
    title: "Compare Numbers! ⚖️",
    subtitle: "Which group has more? Which has less?",
    accent: "yellow",
    questions: [
      { visual: "🍎🍎🍎 vs 🍎🍎🍎🍎🍎", q: "Which side has MORE apples?", options: ["Left (3)","Right (5)","They're equal","I don't know"], answer: 1 },
      { visual: "⭐⭐⭐⭐ vs ⭐⭐", q: "Which side has FEWER stars?", options: ["Left (4)","Right (2)","They're equal","Neither"], answer: 1 },
      { visual: "🐶🐶🐶 vs 🐶🐶🐶", q: "Are these groups EQUAL?", options: ["Yes! Same!","No, left is more","No, right is more","Maybe"], answer: 0 },
      { visual: "8 vs 3", q: "Which number is BIGGER?", options: ["3","8","They're the same","Neither"], answer: 1 },
      { visual: "5 vs 12", q: "Which number is SMALLER?", options: ["12","5","They're the same","Neither"], answer: 1 },
      { visual: "🎈🎈🎈🎈🎈🎈 vs 🎈🎈🎈🎈", q: "Which group has MORE?", options: ["Left (6)","Right (4)","They're equal","Neither"], answer: 0 },
    ]
  },
  {
    title: "Missing Numbers! ❓",
    subtitle: "Fill in the number that's missing!",
    accent: "lilac",
    questions: [
      { visual: "1, 2, ?, 4, 5", q: "What number is missing?", options: ["6","3","0","7"], answer: 1 },
      { visual: "5, 6, 7, ?, 9", q: "What number is missing?", options: ["10","4","8","11"], answer: 2 },
      { visual: "10, ?, 12, 13", q: "What number is missing?", options: ["9","14","11","15"], answer: 2 },
      { visual: "?, 2, 3, 4", q: "What comes first?", options: ["0","1","5","2"], answer: 1 },
      { visual: "15, 16, 17, ?", q: "What comes next?", options: ["19","14","18","20"], answer: 2 },
      { visual: "?, 8, 9, 10", q: "What number is missing?", options: ["6","11","7","5"], answer: 2 },
    ]
  }
];

const encourageCorrect = ["🎉 AMAZING!", "⭐ YOU'RE A STAR!", "🥳 WOOHOO!", "💪 SUPER JOB!", "🌟 BRILLIANT!", "🏆 YOU GOT IT!", "😊 AWESOME WORK!"];
const encourageWrong = ["Almost! Let's try the next one! 💪", "That's okay! Keep going! 🌟", "Good try! You're learning! 📚", "No worries! You'll get the next one! 😊"];

function updateScore() {
  document.getElementById('stars').textContent = state.stars;
  document.getElementById('streak').textContent = state.streak;
  state.level = Math.floor(state.totalCorrect / 5) + 1;
  document.getElementById('level').textContent = state.level;
}

function showSection(idx) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===idx));
  if (!state.sections[idx].initialized) {
    initSection(idx);
  }
}

function initSection(idx) {
  const data = sectionData[idx];
  const sec = state.sections[idx];
  sec.initialized = true;
  sec.current = 0;
  sec.correct = 0;
  sec.questions = [...data.questions].sort(() => Math.random()-0.5);
  renderQuestion(idx);
}

function renderQuestion(idx) {
  const sec = state.sections[idx];
  const data = sectionData[idx];
  const container = document.getElementById('section-'+idx);

  if (sec.current >= sec.questions.length) {
    container.innerHTML = `
      <div class="completion">
        <div class="big-emoji">🏆</div>
        <h2>Section Complete!</h2>
        <p>You got ${sec.correct} out of ${sec.questions.length} right!</p>
        <p>${sec.correct === sec.questions.length ? "🌟 PERFECT SCORE! You're a Number Hero! 🌟" : "Great job! Keep practicing! 💪"}</p>
        <button class="play-again-btn" onclick="resetSection(${idx})">🔄 Play Again!</button>
      </div>`;
    return;
  }

  const q = sec.questions[sec.current];
  const total = sec.questions.length;
  const pct = Math.round((sec.current/total)*100);

  container.innerHTML = `
    <div class="section-header">
      <h2>${data.title}</h2>
      <p>${data.subtitle}</p>
    </div>
    <div class="progress-text">Question ${sec.current+1} of ${total}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card ${data.accent}">
      <div class="quiz-visual">${q.visual}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="options-grid">
        ${q.options.map((o,i) => `<button class="option-btn" onclick="answer(${idx},${i})">${o}</button>`).join('')}
      </div>
      <div id="feedback-${idx}" class="feedback"></div>
    </div>
    <button class="next-btn" id="next-${idx}" style="display:none" onclick="nextQ(${idx})">Next ➡️</button>`;
}

function answer(idx, chosen) {
  const sec = state.sections[idx];
  const q = sec.questions[sec.current];
  const btns = document.querySelectorAll(`#section-${idx} .option-btn`);
  const fb = document.getElementById('feedback-'+idx);
  const nextBtn = document.getElementById('next-'+idx);

  btns.forEach(b => b.disabled = true);

  if (chosen === q.answer) {
    btns[chosen].classList.add('correct');
    sec.correct++;
    state.stars++;
    state.streak++;
    state.totalCorrect++;
    fb.className = 'feedback correct';
    fb.textContent = encourageCorrect[Math.floor(Math.random()*encourageCorrect.length)];
  } else {
    btns[chosen].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    state.streak = 0;
    fb.className = 'feedback wrong';
    fb.textContent = encourageWrong[Math.floor(Math.random()*encourageWrong.length)] + ` The answer is ${q.options[q.answer]}!`;
  }
  updateScore();
  nextBtn.style.display = 'block';
}

function nextQ(idx) {
  state.sections[idx].current++;
  renderQuestion(idx);
}

function resetSection(idx) {
  state.sections[idx].initialized = false;
  initSection(idx);
}

// Init first section
initSection(0);
</script>
</body>
</html>
