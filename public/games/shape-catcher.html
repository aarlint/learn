<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shape Catcher 🔷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(180deg, #0ea5e9 0%, #0284c7 50%, #0369a1 100%);
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
}

.game-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(255,255,255,0.2);
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
}

.stat-icon { font-size: 1.3rem; }

.target-shape {
  background: white;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: 800;
  color: #0284c7;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.target-shape .shape-preview {
  width: 28px;
  height: 28px;
}

.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Feedback */
.feedback {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  font-weight: 800;
  z-index: 20;
  animation: popIn 0.5s ease-out forwards;
  text-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.feedback.correct { color: #22c55e; }
.feedback.wrong { color: #ef4444; }
.feedback.bonus { color: #fbbf24; }

@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { transform: translate(-50%, -50%) scale(1.3); }
  100% { opacity: 0; transform: translate(-50%, -50%) translateY(-40px); }
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: white;
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  max-width: 90%;
  width: 340px;
}

.modal h2 { font-size: 1.8rem; color: #0284c7; margin-bottom: 8px; }
.modal .stars { font-size: 2.5rem; margin: 12px 0; }
.modal p { color: #666; margin-bottom: 20px; }

.modal button {
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 50px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
}

.modal button:active { transform: scale(0.95); }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="stat">
      <span class="stat-icon">⭐</span>
      <span id="score">0</span>
    </div>
    <div class="target-shape">
      Catch: <span id="targetName">Circle</span>
      <svg id="targetPreview" class="shape-preview" viewBox="0 0 40 40"></svg>
    </div>
    <div class="stat">
      <span class="stat-icon">❤️</span>
      <span id="lives">3</span>
    </div>
  </div>
  
  <div class="canvas-wrapper">
    <canvas id="game"></canvas>
    <div id="feedback" class="feedback hidden"></div>
  </div>
  
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Great Job!</h2>
    <div class="stars" id="modalStars">⭐⭐⭐</div>
    <p id="modalText">You caught all the shapes!</p>
    <button id="modalBtn">Play Again!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game state
let score = 0;
let lives = 3;
let level = 1;
let shapesCollected = 0;
let targetShape = 'circle';
let basketX = 0;
let shapes = [];
let particles = [];
let gameRunning = true;

// Shape definitions
const shapeTypes = [
  { name: 'Circle', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }},
  { name: 'Square', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.fillRect(x - size, y - size, size * 2, size * 2);
  }},
  { name: 'Triangle', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size, y + size);
    ctx.lineTo(x - size, y + size);
    ctx.closePath();
    ctx.fill();
  }},
  { name: 'Star', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const angle = (i * Math.PI / 5) - Math.PI / 2;
      const r = i % 2 === 0 ? size : size * 0.4;
      if (i === 0) ctx.moveTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
      else ctx.lineTo(x + Math.cos(angle) * r, y + Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fill();
  }},
  { name: 'Diamond', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size * 0.7, y);
    ctx.lineTo(x, y + size);
    ctx.lineTo(x - size * 0.7, y);
    ctx.closePath();
    ctx.fill();
  }},
  { name: 'Heart', draw: (ctx, x, y, size, color) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y + size * 0.7);
    ctx.bezierCurveTo(x - size * 1.5, y - size * 0.5, x - size * 0.5, y - size * 1.2, x, y - size * 0.4);
    ctx.bezierCurveTo(x + size * 0.5, y - size * 1.2, x + size * 1.5, y - size * 0.5, x, y + size * 0.7);
    ctx.fill();
  }}
];

const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899'];

// Resize
function resize() {
  const wrapper = canvas.parentElement;
  canvas.width = wrapper.clientWidth * window.devicePixelRatio;
  canvas.height = wrapper.clientHeight * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  
  const w = canvas.width / window.devicePixelRatio;
  basketX = w / 2;
}
window.addEventListener('resize', resize);
resize();

// Pick new target shape
function pickTarget() {
  const available = level <= 3 ? shapeTypes.slice(0, 3) : shapeTypes;
  const shape = available[Math.floor(Math.random() * available.length)];
  targetShape = shape.name.toLowerCase();
  
  document.getElementById('targetName').textContent = shape.name;
  
  // Draw preview
  const svg = document.getElementById('targetPreview');
  svg.innerHTML = '';
  const preview = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  // Just use a simple indicator
  svg.innerHTML = `<text x="20" y="28" text-anchor="middle" font-size="24">${getShapeEmoji(targetShape)}</text>`;
}

function getShapeEmoji(shape) {
  const emojis = {
    'circle': '⚫',
    'square': '⬛',
    'triangle': '🔺',
    'star': '⭐',
    'diamond': '💎',
    'heart': '❤️'
  };
  return emojis[shape] || '⬜';
}

// Spawn shape
function spawnShape() {
  const w = canvas.width / window.devicePixelRatio;
  const available = level <= 3 ? shapeTypes.slice(0, 3) : shapeTypes;
  const shapeType = available[Math.floor(Math.random() * available.length)];
  
  shapes.push({
    x: Math.random() * (w - 80) + 40,
    y: -40,
    size: 25 + Math.random() * 10,
    speed: 2 + Math.random() * 2 + level * 0.3,
    type: shapeType,
    color: colors[Math.floor(Math.random() * colors.length)],
    rotation: 0,
    rotationSpeed: (Math.random() - 0.5) * 0.05
  });
}

// Create particles
function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (3 + Math.random() * 4),
      vy: Math.sin(angle) * (3 + Math.random() * 4) - 2,
      radius: 4 + Math.random() * 4,
      color,
      life: 1
    });
  }
}

// Show feedback
function showFeedback(text, type) {
  const el = document.getElementById('feedback');
  el.textContent = text;
  el.className = 'feedback ' + type;
  setTimeout(() => el.classList.add('hidden'), 500);
}

// Update HUD
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
}

// Level complete
function levelComplete() {
  gameRunning = false;
  
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = `Level ${level} Complete!`;
  const starCount = lives >= 3 ? 3 : lives >= 2 ? 2 : 1;
  document.getElementById('modalStars').textContent = '⭐'.repeat(starCount);
  document.getElementById('modalText').textContent = `You caught ${shapesCollected} shapes!`;
  document.getElementById('modalBtn').textContent = 'Next Level!';
  
  score += lives * 50;
  updateHUD();
  
  modal.classList.remove('hidden');
}

// Game over
function gameOver() {
  gameRunning = false;
  
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = 'Game Over!';
  document.getElementById('modalStars').textContent = '💔';
  document.getElementById('modalText').textContent = `Final score: ${score}`;
  document.getElementById('modalBtn').textContent = 'Try Again!';
  
  modal.classList.remove('hidden');
}

// Next level
function nextLevel(restart = false) {
  if (restart) {
    level = 1;
    score = 0;
  } else {
    level++;
  }
  lives = 3;
  shapesCollected = 0;
  shapes = [];
  particles = [];
  gameRunning = true;
  pickTarget();
  updateHUD();
  document.getElementById('modal').classList.add('hidden');
}

// Handle touch/mouse
let touching = false;

function handleMove(clientX) {
  const rect = canvas.getBoundingClientRect();
  const w = canvas.width / window.devicePixelRatio;
  basketX = Math.max(60, Math.min(w - 60, (clientX - rect.left) * (w / rect.width)));
}

canvas.addEventListener('touchstart', (e) => {
  touching = true;
  handleMove(e.touches[0].clientX);
});

canvas.addEventListener('touchmove', (e) => {
  if (touching) handleMove(e.touches[0].clientX);
});

canvas.addEventListener('touchend', () => touching = false);

canvas.addEventListener('mousemove', (e) => {
  handleMove(e.clientX);
});

document.getElementById('modalBtn').addEventListener('click', () => {
  const btn = document.getElementById('modalBtn');
  nextLevel(btn.textContent.includes('Try Again'));
});

// Update
function update() {
  if (!gameRunning) return;
  
  const h = canvas.height / window.devicePixelRatio;
  const catchY = h - 30;
  
  // Spawn shapes
  if (Math.random() < 0.02 + level * 0.005) {
    spawnShape();
  }
  
  // Update shapes
  shapes = shapes.filter(shape => {
    shape.y += shape.speed;
    shape.rotation += shape.rotationSpeed;
    
    // Check catch
    if (shape.y >= catchY - 20 && shape.y <= catchY + 10) {
      const dx = Math.abs(shape.x - basketX);
      if (dx < 55) {
        // Caught!
        const isTarget = shape.type.name.toLowerCase() === targetShape;
        if (isTarget) {
          score += 10 * level;
          shapesCollected++;
          createParticles(shape.x, shape.y, shape.color, 10);
          showFeedback('+10', 'correct');
          
          if (shapesCollected >= 8 + level * 2) {
            setTimeout(levelComplete, 300);
          } else {
            pickTarget();
          }
        } else {
          showFeedback('Not that one!', 'wrong');
          // Don't catch wrong shapes - let them pass through
          return true;
        }
        updateHUD();
        return false;
      }
    }
    
    // Missed target shape
    if (shape.y > h + 50) {
      if (shape.type.name.toLowerCase() === targetShape) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          setTimeout(gameOver, 300);
        }
      }
      return false;
    }
    
    return true;
  });
  
  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    return p.life > 0;
  });
}

// Draw
function draw() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  // Clear with gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#0ea5e9');
  grad.addColorStop(0.5, '#0284c7');
  grad.addColorStop(1, '#0369a1');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 4; i++) {
    const cx = ((i * 200 + Date.now() * 0.02) % (w + 200)) - 100;
    const cy = 40 + i * 50;
    ctx.beginPath();
    ctx.arc(cx, cy, 25, 0, Math.PI * 2);
    ctx.arc(cx + 20, cy - 8, 20, 0, Math.PI * 2);
    ctx.arc(cx + 40, cy, 25, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Draw shapes
  shapes.forEach(shape => {
    ctx.save();
    ctx.translate(shape.x, shape.y);
    ctx.rotate(shape.rotation);
    
    ctx.shadowColor = shape.color;
    ctx.shadowBlur = 10;
    
    shape.type.draw(ctx, 0, 0, shape.size, shape.color);
    
    // Highlight
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = 'white';
    shape.type.draw(ctx, -shape.size * 0.2, -shape.size * 0.2, shape.size * 0.3, 'white');
    ctx.globalAlpha = 1;
    
    ctx.restore();
  });
  
  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  
  // Draw basket on canvas
  const bx = basketX;
  const by = h - 30;
  const bw = 100;
  const bh = 50;

  // Basket rim
  ctx.fillStyle = '#713f12';
  ctx.beginPath();
  ctx.roundRect(bx - bw/2 - 10, by - bh - 10, bw + 20, 15, 8);
  ctx.fill();

  // Basket body
  ctx.fillStyle = '#a16207';
  ctx.beginPath();
  ctx.moveTo(bx - bw/2, by - bh);
  ctx.lineTo(bx + bw/2, by - bh);
  ctx.lineTo(bx + bw/2 - 10, by);
  ctx.lineTo(bx - bw/2 + 10, by);
  ctx.closePath();
  ctx.fill();

  // Basket border
  ctx.strokeStyle = '#713f12';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(bx - bw/2, by - bh);
  ctx.lineTo(bx + bw/2, by - bh);
  ctx.lineTo(bx + bw/2 - 10, by);
  ctx.lineTo(bx - bw/2 + 10, by);
  ctx.closePath();
  ctx.stroke();

  // Horizontal weave lines
  ctx.strokeStyle = '#854d0e';
  ctx.lineWidth = 2;
  for (let i = 1; i <= 3; i++) {
    const t = i / 4;
    const lx = bw/2 - t * 10;
    ctx.beginPath();
    ctx.moveTo(bx - lx, by - bh + t * bh);
    ctx.lineTo(bx + lx, by - bh + t * bh);
    ctx.stroke();
  }
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Init
pickTarget();
updateHUD();
gameLoop();
</script>
</body>
</html>
