<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shape Shooter 🎯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
  min-height: 100vh;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
}

.game-container {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* HUD */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: rgba(0,0,0,0.3);
  border-bottom: 2px solid rgba(139, 92, 246, 0.4);
}

.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1rem;
  font-weight: 600;
  color: white;
}

.stat-icon { font-size: 1.2rem; }
.stat-value { color: #a78bfa; }

.level-badge {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: 700;
  color: white;
  font-size: 0.85rem;
}

/* Target description */
.target-area {
  background: rgba(0,0,0,0.4);
  padding: 16px 20px;
  text-align: center;
}

.target-label {
  color: #a78bfa;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.target-description {
  color: white;
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1.4;
}

.target-description .highlight {
  color: #fbbf24;
}

/* Canvas area */
.canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Feedback */
.feedback {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.5rem;
  font-weight: 800;
  z-index: 20;
  animation: popIn 0.6s ease-out forwards;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  text-align: center;
  pointer-events: none;
}

.feedback.correct { color: #22c55e; }
.feedback.wrong { color: #ef4444; }
.feedback.info { color: #fbbf24; font-size: 1.5rem; }

@keyframes popIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  40% { transform: translate(-50%, -50%) scale(1.1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-20px); }
}

/* Fire button */
.controls {
  background: rgba(0,0,0,0.4);
  padding: 16px 20px;
  display: flex;
  justify-content: center;
  gap: 16px;
}

.fire-btn {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  border: none;
  padding: 16px 48px;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
  transition: transform 0.1s;
}

.fire-btn:active { transform: scale(0.95); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal {
  background: linear-gradient(135deg, #1e1b4b, #312e81);
  border: 2px solid rgba(139, 92, 246, 0.5);
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  color: white;
  max-width: 90%;
  width: 360px;
}

.modal h2 { font-size: 1.8rem; margin-bottom: 8px; }
.modal .stars { font-size: 2.5rem; margin: 16px 0; }
.modal p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }

.modal button {
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

.modal button:active { transform: scale(0.95); }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="game-container">
  <div class="hud">
    <div class="stat">
      <span class="stat-icon">⭐</span>
      <span class="stat-value" id="score">0</span>
    </div>
    <div class="level-badge">Round <span id="round">1</span>/10</div>
    <div class="stat">
      <span class="stat-icon">❤️</span>
      <span id="lives">3</span>
    </div>
  </div>
  
  <div class="target-area">
    <div class="target-label">🎯 Find and shoot the shape:</div>
    <div class="target-description" id="description">
      Has <span class="highlight">4 equal sides</span> and <span class="highlight">4 right angles</span>
    </div>
  </div>
  
  <div class="canvas-wrapper">
    <canvas id="game"></canvas>
    <div id="feedback" class="feedback hidden"></div>
  </div>
  
  <div class="controls">
    <button class="fire-btn" id="fireBtn">🔥 FIRE!</button>
  </div>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">Great Job!</h2>
    <div class="stars" id="modalStars">⭐⭐⭐</div>
    <p id="modalText">You're a shape master!</p>
    <button id="nextBtn">Play Again 🎯</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game state
let score = 0;
let lives = 3;
let round = 1;
let maxRounds = 10;
let canFire = true;

// Cannon in center
let cannon = { x: 0, y: 0, angle: 0 };
let projectile = null;
let shapes = [];
let particles = [];
let targetShapeType = '';

// Shape definitions with properties
const SHAPES = {
  square: {
    name: 'Square',
    descriptions: [
      'Has <span class="highlight">4 equal sides</span> and <span class="highlight">4 right angles</span>',
      'All sides are <span class="highlight">equal</span> with <span class="highlight">90° angles</span>',
      'A rectangle where <span class="highlight">all sides are the same length</span>'
    ],
    color: '#ef4444',
    draw: (ctx, x, y, size) => {
      ctx.fillRect(x - size/2, y - size/2, size, size);
    }
  },
  rectangle: {
    name: 'Rectangle',
    descriptions: [
      'Has <span class="highlight">4 right angles</span> but sides are <span class="highlight">not all equal</span>',
      '<span class="highlight">Opposite sides are equal</span> with <span class="highlight">90° corners</span>',
      'Has <span class="highlight">2 long sides</span> and <span class="highlight">2 short sides</span> with right angles'
    ],
    color: '#3b82f6',
    draw: (ctx, x, y, size) => {
      ctx.fillRect(x - size*0.7, y - size*0.4, size*1.4, size*0.8);
    }
  },
  rhombus: {
    name: 'Rhombus',
    descriptions: [
      'Has <span class="highlight">4 equal sides</span> but <span class="highlight">no right angles</span>',
      'Like a <span class="highlight">tilted square</span> — equal sides, angles not 90°',
      'All sides <span class="highlight">same length</span>, looks like a <span class="highlight">diamond</span>'
    ],
    color: '#22c55e',
    draw: (ctx, x, y, size) => {
      ctx.beginPath();
      ctx.moveTo(x, y - size*0.6);
      ctx.lineTo(x + size*0.5, y);
      ctx.lineTo(x, y + size*0.6);
      ctx.lineTo(x - size*0.5, y);
      ctx.closePath();
      ctx.fill();
    }
  },
  parallelogram: {
    name: 'Parallelogram',
    descriptions: [
      '<span class="highlight">Opposite sides are parallel</span> and equal, but not all sides equal',
      'Like a <span class="highlight">slanted rectangle</span> — no right angles',
      'Has <span class="highlight">2 pairs of parallel sides</span>, looks tilted'
    ],
    color: '#f59e0b',
    draw: (ctx, x, y, size) => {
      ctx.beginPath();
      ctx.moveTo(x - size*0.4, y - size*0.35);
      ctx.lineTo(x + size*0.6, y - size*0.35);
      ctx.lineTo(x + size*0.4, y + size*0.35);
      ctx.lineTo(x - size*0.6, y + size*0.35);
      ctx.closePath();
      ctx.fill();
    }
  },
  trapezoid: {
    name: 'Trapezoid',
    descriptions: [
      'Has exactly <span class="highlight">one pair of parallel sides</span>',
      '<span class="highlight">One side is longer</span> than the opposite side, both are parallel',
      'Has a <span class="highlight">top and bottom</span> that are parallel but different lengths'
    ],
    color: '#ec4899',
    draw: (ctx, x, y, size) => {
      ctx.beginPath();
      ctx.moveTo(x - size*0.3, y - size*0.35);
      ctx.lineTo(x + size*0.3, y - size*0.35);
      ctx.lineTo(x + size*0.55, y + size*0.35);
      ctx.lineTo(x - size*0.55, y + size*0.35);
      ctx.closePath();
      ctx.fill();
    }
  },
  kite: {
    name: 'Kite',
    descriptions: [
      'Has <span class="highlight">2 pairs of adjacent sides</span> that are equal',
      'Looks like a <span class="highlight">flying kite</span> — pointed at top and bottom',
      '<span class="highlight">Two short sides</span> next to each other, <span class="highlight">two long sides</span> next to each other'
    ],
    color: '#8b5cf6',
    draw: (ctx, x, y, size) => {
      ctx.beginPath();
      ctx.moveTo(x, y - size*0.6);
      ctx.lineTo(x + size*0.4, y - size*0.1);
      ctx.lineTo(x, y + size*0.6);
      ctx.lineTo(x - size*0.4, y - size*0.1);
      ctx.closePath();
      ctx.fill();
    }
  }
};

const shapeTypes = Object.keys(SHAPES);

// Resize
function resize() {
  const wrapper = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrapper.clientWidth * dpr;
  canvas.height = wrapper.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  cannon.x = w / 2;
  cannon.y = h / 2;
}

window.addEventListener('resize', resize);
resize();

// Spawn shapes around the cannon
function spawnShapes() {
  shapes = [];
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  // Pick target shape
  targetShapeType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
  const targetShape = SHAPES[targetShapeType];
  const desc = targetShape.descriptions[Math.floor(Math.random() * targetShape.descriptions.length)];
  document.getElementById('description').innerHTML = desc;
  
  // Create array of shapes to place (including target)
  const numShapes = 5 + Math.floor(round / 3);
  const shapePool = [];
  
  // Add the target
  shapePool.push(targetShapeType);
  
  // Add distractors (other shapes)
  const others = shapeTypes.filter(s => s !== targetShapeType);
  for (let i = 1; i < numShapes; i++) {
    shapePool.push(others[Math.floor(Math.random() * others.length)]);
  }
  
  // Shuffle
  for (let i = shapePool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shapePool[i], shapePool[j]] = [shapePool[j], shapePool[i]];
  }
  
  // Place shapes in a circle around cannon
  const radius = Math.min(w, h) * 0.35;
  const angleStep = (Math.PI * 2) / numShapes;
  const startAngle = Math.random() * Math.PI * 2;
  
  for (let i = 0; i < numShapes; i++) {
    const angle = startAngle + i * angleStep;
    const dist = radius + (Math.random() - 0.5) * 40;
    const type = shapePool[i];
    
    shapes.push({
      type: type,
      x: cannon.x + Math.cos(angle) * dist,
      y: cannon.y + Math.sin(angle) * dist,
      size: 50 + Math.random() * 15,
      angle: angle,
      rotation: Math.random() * 0.3 - 0.15,
      pulse: Math.random() * Math.PI * 2
    });
  }
}

// Calculate angle from cannon to point
function getAngleToPoint(x, y) {
  return Math.atan2(y - cannon.y, x - cannon.x);
}

// Handle aim
let aimX = 0, aimY = 0;
let isAiming = false;

function handlePointerMove(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    aimX = e.touches[0].clientX - rect.left;
    aimY = e.touches[0].clientY - rect.top;
  } else {
    aimX = e.clientX - rect.left;
    aimY = e.clientY - rect.top;
  }
  cannon.angle = getAngleToPoint(aimX, aimY);
  isAiming = true;
}

canvas.addEventListener('mousemove', handlePointerMove);
canvas.addEventListener('touchmove', handlePointerMove, { passive: true });
canvas.addEventListener('touchstart', handlePointerMove, { passive: true });

// Fire
function fire() {
  if (!canFire || projectile) return;
  canFire = false;
  
  projectile = {
    x: cannon.x + Math.cos(cannon.angle) * 30,
    y: cannon.y + Math.sin(cannon.angle) * 30,
    vx: Math.cos(cannon.angle) * 15,
    vy: Math.sin(cannon.angle) * 15,
    radius: 8
  };
  
  // Muzzle flash particles
  createParticles(projectile.x, projectile.y, '#fbbf24', 8);
}

document.getElementById('fireBtn').addEventListener('click', fire);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    fire();
  }
});

// Create particles
function createParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 3 + Math.random() * 4,
      color,
      life: 1
    });
  }
}

// Show feedback
function showFeedback(text, type) {
  const el = document.getElementById('feedback');
  el.innerHTML = text;
  el.className = 'feedback ' + type;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  setTimeout(() => el.classList.add('hidden'), 600);
}

// Update HUD
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('round').textContent = round;
}

// Check projectile collision with shapes
function checkCollision() {
  if (!projectile) return;
  
  for (let i = shapes.length - 1; i >= 0; i--) {
    const s = shapes[i];
    const dx = projectile.x - s.x;
    const dy = projectile.y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < s.size * 0.6) {
      // Hit this shape!
      const shapeData = SHAPES[s.type];
      
      if (s.type === targetShapeType) {
        // Correct!
        score += 100;
        showFeedback(`✓ ${shapeData.name}!`, 'correct');
        createParticles(s.x, s.y, '#22c55e', 20);
        createParticles(s.x, s.y, '#fbbf24', 15);
        
        round++;
        if (round > maxRounds) {
          setTimeout(showWin, 800);
        } else {
          setTimeout(() => {
            spawnShapes();
            canFire = true;
          }, 1000);
        }
      } else {
        // Wrong shape
        lives--;
        showFeedback(`✗ That's a ${shapeData.name}`, 'wrong');
        createParticles(s.x, s.y, '#ef4444', 15);
        
        if (lives <= 0) {
          setTimeout(showGameOver, 800);
        } else {
          setTimeout(() => {
            canFire = true;
          }, 800);
        }
      }
      
      projectile = null;
      updateHUD();
      return;
    }
  }
}

// Game over / win
function showWin() {
  const stars = lives === 3 ? 3 : lives === 2 ? 2 : 1;
  document.getElementById('modalTitle').textContent = 'You Win!';
  document.getElementById('modalStars').textContent = '⭐'.repeat(stars);
  document.getElementById('modalText').textContent = `Score: ${score} — You know your quadrilaterals!`;
  document.getElementById('nextBtn').textContent = 'Play Again 🎯';
  document.getElementById('modal').classList.remove('hidden');
}

function showGameOver() {
  document.getElementById('modalTitle').textContent = 'Game Over';
  document.getElementById('modalStars').textContent = '💫';
  document.getElementById('modalText').textContent = `Score: ${score} — Keep practicing!`;
  document.getElementById('nextBtn').textContent = 'Try Again 🎯';
  document.getElementById('modal').classList.remove('hidden');
}

document.getElementById('nextBtn').addEventListener('click', () => {
  document.getElementById('modal').classList.add('hidden');
  score = 0;
  lives = 3;
  round = 1;
  projectile = null;
  updateHUD();
  spawnShapes();
  canFire = true;
});

// Draw cannon
function drawCannon() {
  const cx = cannon.x;
  const cy = cannon.y;
  
  // Base circle
  ctx.fillStyle = '#4c1d95';
  ctx.beginPath();
  ctx.arc(cx, cy, 25, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fill();
  
  // Barrel
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(cannon.angle);
  
  ctx.fillStyle = '#6d28d9';
  ctx.fillRect(0, -8, 35, 16);
  
  ctx.fillStyle = '#8b5cf6';
  ctx.fillRect(30, -10, 8, 20);
  
  ctx.restore();
  
  // Center dot
  ctx.fillStyle = '#c4b5fd';
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fill();
}

// Draw shapes
function drawShapes() {
  shapes.forEach(s => {
    s.pulse += 0.03;
    const pulseScale = 1 + Math.sin(s.pulse) * 0.05;
    const size = s.size * pulseScale;
    
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    
    const shapeData = SHAPES[s.type];
    
    // Glow
    ctx.shadowColor = shapeData.color;
    ctx.shadowBlur = 15;
    
    ctx.fillStyle = shapeData.color;
    shapeData.draw(ctx, 0, 0, size);
    
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    shapeData.draw(ctx, 0, 0, size);
    ctx.stroke();
    
    ctx.restore();
  });
}

// Draw projectile
function drawProjectile() {
  if (!projectile) return;
  
  ctx.shadowColor = '#fbbf24';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// Draw particles
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Draw aim line
function drawAimLine() {
  if (!canFire || projectile) return;
  
  ctx.save();
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cannon.x, cannon.y);
  ctx.lineTo(
    cannon.x + Math.cos(cannon.angle) * 200,
    cannon.y + Math.sin(cannon.angle) * 200
  );
  ctx.stroke();
  ctx.restore();
}

// Update
function update() {
  // Update projectile
  if (projectile) {
    projectile.x += projectile.vx;
    projectile.y += projectile.vy;
    
    checkCollision();
    
    // Out of bounds
    const w = canvas.width / window.devicePixelRatio;
    const h = canvas.height / window.devicePixelRatio;
    if (projectile && (projectile.x < -50 || projectile.x > w + 50 || 
        projectile.y < -50 || projectile.y > h + 50)) {
      projectile = null;
      showFeedback('Missed!', 'info');
      setTimeout(() => { canFire = true; }, 500);
    }
  }
  
  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
    return p.life > 0;
  });
}

// Draw
function draw() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  
  // Clear
  ctx.clearRect(0, 0, w, h);
  
  // Background gradient
  const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h));
  grad.addColorStop(0, '#312e81');
  grad.addColorStop(1, '#1e1b4b');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // Grid dots
  ctx.fillStyle = 'rgba(139, 92, 246, 0.15)';
  for (let x = 0; x < w; x += 30) {
    for (let y = 0; y < h; y += 30) {
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  drawAimLine();
  drawShapes();
  drawCannon();
  drawProjectile();
  drawParticles();
}

// Game loop
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Init
updateHUD();
spawnShapes();
gameLoop();
</script>
</body>
</html>
